<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* ── Mobile detection hook ─────────────────────────────── */
function useIsMobile(breakpoint = 600) {
  const [mobile, setMobile] = useState(window.innerWidth <= breakpoint);
  useEffect(() => {
    const onResize = () => setMobile(window.innerWidth <= breakpoint);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [breakpoint]);
  return mobile;
}

const TYPES = [

];
const SPENDERS = ["", "Mgg", "Dkg", "Acns"];
const ACCOUNTS = ["Chase", "Acorns"];
const ACORNS_SUBS = ["Checking", "General"];
const TRANSFER_DIRS = [
  { value: "acorns-general-to-chase", label: "Acorns General \u2192 Chase" },
  { value: "chase-to-acorns-general", label: "Chase \u2192 Acorns General" },

];

const CATEGORIES = [
  "Rental Income", "Interest", "Monthly Contribution",
  "Startup Costs", "Cleaning", "Internet",
  "Utilities (Electric, Water, Trash)", "Mortgage Payment", "General Expense",
  "Projects", "Loan Repayment", "Transfer",
];
const QUICK_ADDS = [
  { emoji: "\uD83C\uDFE0", label: "Mortgage",  type: "Mortgage Payment", amount: "3330.11", account: "Chase", description: "Mortgage Payment" },

  { emoji: "\uD83D\uDCCA", label: "PriceLabs", type: "Utilities (Electric, Water, Trash)", amount: "22.00", account: "Chase", description: "PriceLabs" },
  { emoji: "\uD83D\uDDD1\uFE0F", label: "Trash", type: "Utilities (Electric, Water, Trash)", amount: "70.00", account: "Chase", spender: "Mgg",
    descFn: () => { const m = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const now = new Date(); return "Trash for " + m[now.getMonth()] + " and " + m[(now.getMonth()+1) % 12]; },
    notes: "by venmo, transferred to GDG", emailReminder: true, emailNotes: "Send $70 from Lake House to GDG" },
  { emoji: "\uD83E\uDDF9", label: "Cleaning", type: "Cleaning", amount: "250.00", account: "Chase", spender: "Mgg",
    description: "Lisa Flood", notes: "by Venmo",
    emailReminder: true, emailNotes: "Transfer 250 from Lake House to GDG" },
  { emoji: "\uD83D\uDCA7", label: "Water", type: "Utilities (Electric, Water, Trash)", amount: "38.23", account: "Chase", description: "Water Bill" },
  { emoji: "\uD83C\uDF3F", label: "Lawncare", type: "General Expense", amount: "40.00", account: "Chase", spender: "Mgg",
    description: "Hack Bros Lawncare", notes: "by Venmo",
    emailReminder: true, emailNotes: "Transfer $40 from Lake House to GDG" },
  { emoji: "\uD83D\uDC68\u200D\uD83E\uDDB3", label: "DKG Monthly", type: "Monthly Contribution", amount: "2000.00", account: "Chase", spender: "Dkg",
    description: "DKG Monthly Contribution",
    dateFn: () => { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-24"; },
    emailReminder: true, emailNotes: "Transfer 2000 from GDG to Lake House" },
  { emoji: "\uD83D\uDC68", label: "MGG Monthly", type: "Monthly Contribution", amount: "2000.00", spender: "Mgg",
    description: "MGG Monthly Contribution", isSplit: true },
  { emoji: "\uD83C\uDFE6", label: "Loan Repay", type: "Loan Repayment", amount: "200.00", account: "Chase", description: "Edward Jones payment (steps)" },
];
// Predictable once-a-month items, matched against the current month's transactions for the checklist.
// label matches a QUICK_ADDS entry (for one-tap Add); match = how to detect it in the ledger.
const MONTHLY_BILLS = [
  { label: "Mortgage",    match: { type: "Mortgage Payment" } },
  { label: "Internet",    match: { type: "Internet" } },
  { label: "PriceLabs",   match: { desc: "pricelabs" } },
  { label: "Water",       match: { desc: "water" } },
  { label: "Trash",       match: { desc: "trash" } },
  { label: "Loan Repay",  match: { type: "Loan Repayment" } },
  { label: "DKG Monthly", match: { type: "Monthly Contribution", desc: "dkg" } },
  { label: "MGG Monthly", match: { type: "Monthly Contribution", desc: "mgg" } },
];

const INITIAL_STATE = {
  lastRR: 66, lastCH: 54, lastAC: 10,
  chaseBalance: 1028.36, acornsBalance: 6767.28, acornsChecking: 460.09,
  grandTotal: 7795.64,
};

/* ── localStorage helpers ────────────────────────────────── */
const SK = { state: "lh_state", history: "lh_history", email: "lh_email", script: "lh_script", token: "lh_token", recips: "lh_recips" };
const DEFAULT_RECIPS = "kasgilbert@gmail.com, gilbertlumber@gmail.com, mogilbert1@gmail.com";
const load = (key, fallback) => {
  try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : fallback; }
  catch { return fallback; }
};
const save = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

/* ── Formatting helpers ──────────────────────────────────── */
const formatMoney = (n) => {
  const abs = Math.abs(n);
  const formatted = "$" + abs.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  return n < 0 ? "(" + formatted + ")" : formatted;
};
const padNum = (prefix, num) => prefix + String(num).padStart(3, "0");
const fmtDate = (d) => { const p = d.split("-"); return p[1] + "/" + p[2] + "/" + p[0]; };
// Gentle seasonal flourish for the header (it's a lake house — let it feel like one).
const seasonOf = (m) => {
  if (m === 11 || m <= 1) return { emoji: "❄️", word: "Winter" };   // Dec–Feb
  if (m <= 4) return { emoji: "🌷", word: "Spring" };               // Mar–May
  if (m <= 7) return { emoji: "☀️", word: "Summer" };               // Jun–Aug
  return { emoji: "🍂", word: "Fall" };                              // Sep–Nov
};

// M/D/YYYY (or MM/DD/YYYY) -> sortable/comparable integer YYYYMMDD
const dateToNum = (mdy) => { const p = String(mdy).split("/"); return p.length < 3 ? 0 : (+p[2]) * 10000 + (+p[0]) * 100 + (+p[1]); };
// "MM/DD/YYYY" (or M/D/YY) -> "YYYY-MM-DD" for <input type="date">
const isoFromMDY = (mdy) => {
  const p = String(mdy).split("/");
  if (p.length < 3) return "";
  let y = p[2]; if (y.length === 2) y = "20" + y;
  return y + "-" + String(+p[0]).padStart(2, "0") + "-" + String(+p[1]).padStart(2, "0");
};
// Calendar-month options (label + ISO start/end) from the earliest statement (or 12 mo back) through now
const monthOptionsFor = (stmtPeriods) => {
  const names = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  let earliest = null;
  (stmtPeriods || []).forEach(p => { const iso = isoFromMDY(p.startDate); if (iso && (!earliest || iso < earliest)) earliest = iso; });
  const now = new Date();
  let cy, cm;
  if (earliest) { const ep = earliest.split("-"); cy = +ep[0]; cm = +ep[1] - 1; }
  else { cy = now.getFullYear(); cm = now.getMonth() - 11; while (cm < 0) { cm += 12; cy--; } }
  const out = []; const endY = now.getFullYear(), endM = now.getMonth();
  while (cy < endY || (cy === endY && cm <= endM)) {
    const mm = String(cm + 1).padStart(2, "0");
    const lastDay = new Date(cy, cm + 1, 0).getDate();
    out.push({ label: names[cm] + " " + cy, start: cy + "-" + mm + "-01", end: cy + "-" + mm + "-" + String(lastDay).padStart(2, "0") });
    cm++; if (cm > 11) { cm = 0; cy++; }
  }
  out.reverse();
  return out;
};
// The calendar month with the most days inside [startDate, endDate], e.g. "June 2026"
const dominantMonth = (startDate, endDate) => {
  try {
    const names = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const sp = startDate.split("/"), ep = endDate.split("/");
    const s = new Date(+sp[2], +sp[0] - 1, +sp[1]);
    const e = new Date(+ep[2], +ep[0] - 1, +ep[1]);
    const counts = {};
    for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
      const key = d.getFullYear() + "-" + d.getMonth();
      counts[key] = (counts[key] || 0) + 1;
    }
    let best = "", max = 0;
    for (const k in counts) { if (counts[k] > max) { max = counts[k]; best = k; } }
    const parts = best.split("-");
    return names[+parts[1]] + " " + parts[0];
  } catch (e) { return endDate; }
};

// Categories treated as financing/capital: they net to $0 in the YTD P&L, because a
// loan inflow cancels the spending it funds. The loan *repayments* are a separate
// expense category (NOT listed here), so those still count against profit as normal.
const PL_EXCLUDE = ["Projects"];

// Year-to-date operating profit/loss: what the rental EARNED (Rental + Interest) minus
// what it SPENT (Expenses). Owner contributions are capital, not income, so they're left
// out entirely. Loan-funded Projects spend is excluded too — it counts later, as the loan
// is repaid. (We deliberately do NOT add the ending balance: it already reflects income
// and expenses, so adding it on top would double-count them.)
const computeYtdPL = (cv) => {
  const fyIncome = cv.fyIncome || {}, fyExpense = cv.fyExpense || {};
  let exclExp = 0;
  PL_EXCLUDE.forEach((k) => { exclExp += Math.abs(fyExpense[k] || 0); });
  return (fyIncome["Rental Income"] || 0) + (fyIncome["Interest"] || 0)
       - (Math.abs(cv.fyTotalExpense) - exclExp);
};

// Distinct, color-blind-friendly-ish palette for the dashboard expense-mix chart.
const DASH_PALETTE = ["#2563eb", "#dc2626", "#16a34a", "#d97706", "#7c3aed", "#0891b2", "#db2777", "#65a30d", "#475569", "#ea580c"];

// Aggregate the all-time queryTransactions result into everything the Owner Dashboard
// needs: per-month income/expense (+ a running cumulative net cash), the expense mix by
// type, and the headline KPIs. Income vs. expense is split by SIGN (matching how the
// backend builds statements: positive amounts are income lines, negative are expenses),
// so any dynamic category "just works". YTD P&L reuses computeYtdPL so it stays identical
// to the statement screens (Rental + Interest - Expenses; Projects & contributions out).
const buildDashboardData = (txns) => {
  const mAbbr = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const byMonth = {};
  const expenseByType = {};
  const fyIncome = {}, fyExpense = {};
  let fyTotalExpense = 0, totalRental = 0, bookings = 0;

  (txns || []).forEach((t) => {
    const amt = typeof t.amount === "number" ? t.amount : (parseFloat(t.amount) || 0);
    const p = String(t.date || "").split("/");           // MM/DD/YYYY
    if (p.length < 3) return;
    const m = +p[0], y = +p[2];
    if (!y || !m) return;
    const key = y + "-" + String(m).padStart(2, "0");
    if (!byMonth[key]) byMonth[key] = { key: key, y: y, m: m, label: mAbbr[m - 1] + " " + String(y).slice(2), income: 0, expense: 0 };
    const type = t.type || "Other";
    if (amt >= 0) {
      byMonth[key].income += amt;
      fyIncome[type] = (fyIncome[type] || 0) + amt;
      if (type === "Rental Income") { totalRental += amt; bookings++; }
    } else {
      const a = Math.abs(amt);
      byMonth[key].expense += a;
      fyExpense[type] = (fyExpense[type] || 0) + amt;     // keep sign; computeYtdPL/abs handles it
      fyTotalExpense += amt;
      expenseByType[type] = (expenseByType[type] || 0) + a;
    }
  });

  const months = Object.keys(byMonth).map((k) => byMonth[k]).sort((a, b) => (a.y - b.y) || (a.m - b.m));
  let run = 0;
  months.forEach((mo) => { run += (mo.income - mo.expense); mo.net = mo.income - mo.expense; mo.cumNet = run; });

  const ytdPL = computeYtdPL({ fyIncome: fyIncome, fyExpense: fyExpense, fyTotalExpense: fyTotalExpense });
  const totalExpense = Object.keys(expenseByType).reduce((s, k) => s + expenseByType[k], 0);
  const avgMonthlyExpense = months.length ? totalExpense / months.length : 0;
  const expenseMix = Object.keys(expenseByType)
    .map((k) => ({ type: k, amount: expenseByType[k] }))
    .sort((a, b) => b.amount - a.amount);

  return { months: months, ytdPL: ytdPL, totalRental: totalRental, bookings: bookings,
    avgMonthlyExpense: avgMonthlyExpense, totalExpense: totalExpense, expenseMix: expenseMix,
    txCount: (txns || []).length };
};

/* ── Schedule E Tax Pack mapping ──────────────────────────────
   Maps each ledger Type onto an IRS Schedule E (Form 1040, Part I) line.
   IMPORTANT (decisions baked in — see deploy notes):
   - "Interest" here is interest EARNED (income), NOT mortgage interest paid, so it does
     NOT go on Line 12. It's reported separately as investment income (Schedule B).
   - "Mortgage Payment" is shown on its own: only the INTEREST portion is deductible
     (Line 12), which we can't derive from a single payment figure, so it is never auto-
     placed into the deductible total — the owner fills it from the lender's Form 1098.
   - Monthly Contributions (owner capital), Projects (loan-funded improvements → capitalize
     & depreciate), and Loan Repayments (principal) are excluded from deductible expenses.
   This is an organizing aid, NOT tax advice. */
const SCHED_E_MAP = {
  "Rental Income":                       { line: "3",  kind: "income" },
  "Cleaning":                            { line: "7",  kind: "expense" },
  "Internet":                            { line: "17", kind: "expense" },
  "Utilities (Electric, Water, Trash)":  { line: "17", kind: "expense" },
  "General Expense":                     { line: "19", kind: "expense" },
  "Mortgage Payment":                    { kind: "mortgage" },
  "Interest":                            { kind: "investment-income" },
  "Monthly Contribution":                { kind: "excluded", bucket: "contributions" },
  "Projects":                            { kind: "excluded", bucket: "projects" },
  "Loan Repayment":                      { kind: "excluded", bucket: "loanRepay" },
};
// Canonical order + labels for the deductible expense lines we may render.
const SCHED_E_LINES = [
  { n: "5",  label: "Advertising" }, { n: "6",  label: "Auto and travel" },
  { n: "7",  label: "Cleaning and maintenance" }, { n: "8",  label: "Commissions" },
  { n: "9",  label: "Insurance" }, { n: "10", label: "Legal & other professional fees" },
  { n: "11", label: "Management fees" }, { n: "13", label: "Other interest" },
  { n: "14", label: "Repairs" }, { n: "15", label: "Supplies" }, { n: "16", label: "Taxes" },
  { n: "17", label: "Utilities" }, { n: "18", label: "Depreciation" }, { n: "19", label: "Other" },
];
const SCHED_E_LABEL = SCHED_E_LINES.reduce((o, l) => { o[l.n] = l.label; return o; }, {});

// Aggregate one calendar year of transactions into a Schedule E organizer.
const buildSchedE = (txns, year) => {
  const num = (v) => typeof v === "number" ? v : (parseFloat(v) || 0);
  const expenseByLine = {};   // lineNum -> total (positive)
  const lineDetail = {};      // lineNum -> { typeName: amount } (for 17/19 breakdowns)
  const excl = { investmentIncome: 0, contributions: 0, projects: 0, loanRepay: 0, otherIncome: 0 };
  const otherIncomeDetail = {};
  let rents = 0, mortgageTotal = 0, mortgageCount = 0;

  const asOtherIncome = (name, v) => { excl.otherIncome += v; otherIncomeDetail[name] = (otherIncomeDetail[name] || 0) + v; };
  (txns || []).forEach((t) => {
    const amt = num(t.amount), a = Math.abs(amt), type = t.type || "Other";
    const m = SCHED_E_MAP[type];
    const addExpense = (line, name) => {
      expenseByLine[line] = (expenseByLine[line] || 0) + a;
      if (!lineDetail[line]) lineDetail[line] = {};
      lineDetail[line][name] = (lineDetail[line][name] || 0) + a;
    };
    if (m) {
      if (m.kind === "income") rents += amt;
      // Only NEGATIVE amounts are genuine deductions. A POSITIVE amount on a deductible
      // category (a vendor refund/credit, or a sign-overridden income row) must NOT inflate
      // the deduction — surface it as "other income (review)", matching the Dashboard, which
      // also classifies by sign. (Was Math.abs() before — that overstated deductions.)
      else if (m.kind === "expense") { if (amt < 0) addExpense(m.line, type); else asOtherIncome(type, amt); }
      else if (m.kind === "mortgage") { if (amt < 0) { mortgageTotal += a; mortgageCount++; } else asOtherIncome(type, amt); }
      else if (m.kind === "investment-income") excl.investmentIncome += amt;
      else if (m.kind === "excluded") excl[m.bucket] += a;
    } else {
      // Unknown/dynamic type: classify by sign. Negative → Line 19 (Other); positive → other income (review).
      if (amt < 0) addExpense("19", type);
      else asOtherIncome(type, amt);
    }
  });

  const expenseLines = SCHED_E_LINES.filter((l) => expenseByLine[l.n] > 0).map((l) => ({
    n: l.n, label: l.label, amount: expenseByLine[l.n],
    detail: Object.keys(lineDetail[l.n] || {}).length > 1
      ? Object.keys(lineDetail[l.n]).map((k) => ({ name: k, amount: lineDetail[l.n][k] }))
      : null,
  }));
  const totalExpenses = expenseLines.reduce((s, l) => s + l.amount, 0);

  return {
    year: year, rents: rents, expenseLines: expenseLines, totalExpenses: totalExpenses,
    net: rents - totalExpenses, mortgageTotal: mortgageTotal, mortgageCount: mortgageCount,
    excl: excl, otherIncomeDetail: otherIncomeDetail, txCount: (txns || []).length,
  };
};

  noteLine("Repaying borrowed principal is not a deductible expense.");
  if (pk.excl.otherIncome > 0) { row("Other income (review)", fmtM(pk.excl.otherIncome)); noteLine("Uncategorized income - confirm where this belongs."); }
  y += 2;

  // Disclaimer + footer
  checkPage(20);
  doc.setFillColor(254, 243, 199); doc.rect(mL, y, cW, 14, "F");
  doc.setDrawColor(245, 158, 11); doc.rect(mL, y, cW, 14, "S");
  doc.setTextColor(146, 64, 14); doc.setFontSize(8); doc.setFont("helvetica", "bold");
  doc.text("This is an organizing summary, not tax advice.", W / 2, y + 5.5, { align: "center" });
  doc.setFont("helvetica", "normal"); doc.setFontSize(7);
  doc.text("Confirm every figure and its treatment with your CPA before filing. Categories are mapped from the ledger by type.", W / 2, y + 10, { align: "center" });
  y += 20;
  doc.setTextColor(148, 163, 184); doc.setFontSize(8);
  doc.text(pk.txCount + " transaction" + (pk.txCount !== 1 ? "s" : "") + " in " + pk.year + "  -  Generated: " + new Date().toLocaleString(), W / 2, y, { align: "center" });

  var filename = "LakeHouse_ScheduleE_" + pk.year + ".pdf";
  return { base64: doc.output("datauristring").split(",")[1], filename: filename, doc: doc };
}

// Tasteful one-shot confetti for genuine wins (positive YTD). No-op if the user prefers
// reduced motion. Self-cleans the canvas when done. Money app → restrained, never looping.
function fireConfetti() {
  try {
    if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    var c = document.createElement("canvas");
    c.className = "lh-confetti";
    c.width = window.innerWidth; c.height = window.innerHeight;
    document.body.appendChild(c);
    var ctx = c.getContext("2d");
    var colors = ["#f59e0b", "#16a34a", "#2563eb", "#fbbf24", "#34d399"];
    var parts = [];
    for (var i = 0; i < 90; i++) parts.push({
      x: c.width / 2 + (Math.random() - 0.5) * 140, y: c.height * 0.42,
      vx: (Math.random() - 0.5) * 9, vy: Math.random() * -11 - 4,
      g: 0.28 + Math.random() * 0.12, size: 5 + Math.random() * 6,
      rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 0.3,
      color: colors[(Math.random() * colors.length) | 0]
    });
    var start = null, dur = 1500;
    function frame(ts) {
      if (start === null) start = ts;
      var t = ts - start;
      ctx.clearRect(0, 0, c.width, c.height);
      for (var i = 0; i < parts.length; i++) {
        var p = parts[i];
        p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
        ctx.save(); ctx.globalAlpha = Math.max(0, 1 - t / dur);
        ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.fillStyle = p.color; ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        ctx.restore();
      }
      if (t < dur) requestAnimationFrame(frame);
      else if (c.parentNode) c.parentNode.removeChild(c);
    }
    requestAnimationFrame(frame);
  } catch (e) { /* never let a flourish break the app */ }
}

// A number that counts up to its value once (cubic ease-out). Snaps instantly if the user
// prefers reduced motion. Used for the YTD profit headline.
function CountUp(props) {
  const [v, setV] = useState(props.from || 0);
  useEffect(() => {
    if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) { setV(props.value); return; }
    var raf, start = null, from = props.from || 0, dur = props.duration || 700;
    function step(ts) {
      if (start === null) start = ts;
      var p = Math.min(1, (ts - start) / dur), e = 1 - Math.pow(1 - p, 3);
      setV(from + (props.value - from) * e);
      if (p < 1) raf = requestAnimationFrame(step);
    }
    raf = requestAnimationFrame(step);
    return () => { if (raf) cancelAnimationFrame(raf); };
  }, [props.value, props.duration]);
  return React.createElement("span", { style: props.style }, props.format ? props.format(v) : v);
}

/* ══════════════════════════════════════════════════════════ */
function App() {
  const isMobile = useIsMobile();
  const [state, setState] = useState(() => load(SK.state, INITIAL_STATE));
  const [form, setForm] = useState({...emptyForm});
  const [queue, setQueue] = useState([]);
  const [toast, setToast] = useState(null);
  const [showHelp, setShowHelp] = useState(false);
  const [history, setHistory] = useState(() => load(SK.history, []));
  const [showHistory, setShowHistory] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [reminderEmail, setReminderEmail] = useState(() => {
    try { return localStorage.getItem(SK.email) || ""; } catch { return ""; }
  });
  const [closeMonthView, setCloseMonthView] = useState(null);
  const [previewRange, setPreviewRange] = useState({ startDate: "", endDate: "" });
  const [previewing, setPreviewing] = useState(false);
  const [scriptUrl, setScriptUrl] = useState(() => {
    try { return localStorage.getItem(SK.script) || ""; } catch { return ""; }
  });
  const [scriptToken, setScriptToken] = useState(() => {
    try { return localStorage.getItem(SK.token) || ""; } catch { return ""; }
  });
  const [stmtRecipients, setStmtRecipients] = useState(() => {
    try { return localStorage.getItem(SK.recips) || DEFAULT_RECIPS; } catch { return DEFAULT_RECIPS; }
  });
  const [syncing, setSyncing] = useState(false);
  const [syncError, setSyncError] = useState(false);
  const [processing, setProcessing] = useState(false);
  const [lastBatch, setLastBatch] = useState(null);
  const [billsView, setBillsView] = useState({ open: false, loading: false, found: {}, error: null });
  const [expensePicker, setExpensePicker] = useState({ open: false, loading: false, expenses: [], selected: {} });

  // Persist settings
  useEffect(() => { try { localStorage.setItem(SK.email, reminderEmail); } catch {} }, [reminderEmail]);
  useEffect(() => { try { localStorage.setItem(SK.script, scriptUrl); } catch {} }, [scriptUrl]);
  useEffect(() => { try { localStorage.setItem(SK.token, scriptToken); } catch {} }, [scriptToken]);
  useEffect(() => { try { localStorage.setItem(SK.recips, stmtRecipients); } catch {} }, [stmtRecipients]);

  // Attach the optional auth token to every request (no-op until a token is set)
  const withTok = (obj) => Object.assign({}, obj, { token: scriptToken });
  const getUrl = () => scriptUrl + (scriptToken ? ((scriptUrl.indexOf("?") >= 0 ? "&" : "?") + "token=" + encodeURIComponent(scriptToken)) : "");

  // Sync state from Google Sheet on load
  useEffect(() => {
    if (!scriptUrl) return;
    setSyncing(true); setSyncError(false);
    fetch(getUrl()).then(r => r.json()).then(data => {
      if (data && data.lastRR !== undefined) { setState(data); save(SK.state, data); }
      else { setSyncError(true); }
    }).catch(() => { setSyncError(true); }).finally(() => setSyncing(false));
  }, []);

  const flash = (msg, warn) => { setToast({ msg, warn }); setTimeout(() => setToast(null), 3500); };
  const updateForm = (field, value) => setForm(f => ({...f, [field]: value}));
  const applyQuickAdd = (qa) => {
    if (!qa) return;
    setForm({ ...emptyForm, type: qa.type, amount: qa.amount, account: qa.account || "Chase",
      spender: qa.spender || "", description: qa.descFn ? qa.descFn() : qa.description,
      date: qa.dateFn ? qa.dateFn() : new Date().toISOString().split("T")[0],
      notes: qa.notes || "", emailReminder: qa.emailReminder || false, emailNotes: qa.emailNotes || "",
      isSplit: qa.isSplit || false });
  };
  const isIncomeType = (t) => ["Rental Income", "Interest", "Monthly Contribution"].includes(t);

  /* ── Validation ──────────────────────────────────────── */
  const validate = () => {
    if (!form.type) return "Select a transaction type";
    if (!form.date) return "Enter a date";
    if (!form.amount || isNaN(parseFloat(form.amount)) || parseFloat(form.amount) === 0) return "Enter a valid amount";
    if (!form.description) return "Enter a description";
    if (form.type === "Monthly Contribution" && form.isSplit) {
      const r = (v) => Math.round((parseFloat(v) || 0) * 100) / 100;
      const total = r(form.splitCash) + r(form.splitAcorns) + r(form.splitExpenses);
      if (Math.abs(total - r(form.amount)) > 0.005)
        return "Split amounts (" + formatMoney(total) + ") must equal the total (" + formatMoney(r(form.amount)) + ")";
    }
    return null;
  };

  /* ── Queue management ────────────────────────────────── */
  const addToQueue = () => {
    const err = validate();
    if (err) { flash(err, true); return; }
    if (form.type === "Transfer") {
      setQueue(q => [...q, { ...form, rrNum: "", acctNum: "", isIncome: false }]);
      setForm({...emptyForm});
      return;
    }
    const nonTransferCount = queue.filter(t => t.type !== "Transfer").length;
    const nextRR = state.lastRR + 1 + nonTransferCount;
    const isChase = form.account === "Chase";
    // Count CH/AC consumed by all queued items
    let chUsed = 0, acUsed = 0;
    queue.forEach(t => {
      if (t.type === "Transfer") {
        if (t.transferDir !== "acorns-general-to-checking") chUsed++;
        acUsed += t.transferDir === "acorns-general-to-checking" ? 2 : 1;
      } else if (t.type === "Monthly Contribution" && t.isSplit) {
        // A split consumes a CH for cash, a CH for unreimbursed expenses, and an AC for the Acorns portion
        if ((parseFloat(t.splitCash) || 0) > 0) chUsed++;
        if ((parseFloat(t.splitExpenses) || 0) > 0) chUsed++;
        if ((parseFloat(t.splitAcorns) || 0) > 0) acUsed++;
      } else {
        if (t.account === "Chase") chUsed++; else acUsed++;
      }
    });
    const nextAcct = isChase ? state.lastCH + 1 + chUsed : state.lastAC + 1 + acUsed;
    const resolvedIncome = form.signOverride ? form.signOverride === "income" : isIncomeType(form.type);
    setQueue(q => [...q, {
      ...form, rrNum: padNum("RR", nextRR),
      acctNum: isChase ? padNum("CH", nextAcct) : padNum("AC", nextAcct),
      isIncome: resolvedIncome,
    }]);
    setForm({...emptyForm});
  };

  const removeFromQueue = (index) => {
    setQueue(q => {
      const newQ = q.filter((_, i) => i !== index);
      let rrC = 0, chC = 0, acC = 0;
      return newQ.map(tx => {
        if (tx.type === "Transfer") {
          // Transfers consume CH/AC numbers but no RR
          if (tx.transferDir !== "acorns-general-to-checking") chC++;
          acC += tx.transferDir === "acorns-general-to-checking" ? 2 : 1;
          return { ...tx };
        }
        rrC++;
        if (tx.type === "Monthly Contribution" && tx.isSplit) {
          const hasCash = (parseFloat(tx.splitCash) || 0) > 0;
          const hasExp  = (parseFloat(tx.splitExpenses) || 0) > 0;
          const hasAc   = (parseFloat(tx.splitAcorns) || 0) > 0;
          let acct = "";
          if (hasCash || hasExp) acct = padNum("CH", state.lastCH + chC + 1);
          else if (hasAc) acct = padNum("AC", state.lastAC + acC + 1);
          if (hasCash) chC++;
          if (hasExp) chC++;
          if (hasAc) acC++;
          return { ...tx, rrNum: padNum("RR", state.lastRR + rrC), acctNum: acct };
        }
        const isChase = tx.account === "Chase";
        if (isChase) chC++; else acC++;
        return { ...tx, rrNum: padNum("RR", state.lastRR + rrC),
          acctNum: isChase ? padNum("CH", state.lastCH + chC) : padNum("AC", state.lastAC + acC) };
      });
    });
  };

  /* ── Process all — the big "Go" ──────────────────────── */
  const processAll = async () => {
    if (queue.length === 0) return;
    setProcessing(true);

    // Build transaction payload (amounts rounded to whole cents so Main == Chase + Acorns exactly)
    const cents = (v) => Math.round((parseFloat(v) || 0) * 100) / 100;
    const transactions = queue.map(tx => {
      if (tx.type === "Transfer") {
        return {
          type: "Transfer", transferDir: tx.transferDir, date: tx.date,
          description: tx.description, amount: Math.abs(cents(tx.amount)),
          notes: tx.notes || "",
        };
      }
      const amt = tx.isIncome ? Math.abs(cents(tx.amount)) : -Math.abs(cents(tx.amount));
      return {
        account: tx.account, type: tx.type, date: tx.date,
        spender: tx.spender, description: tx.description, amount: amt,
        notes: tx.notes || "",
        acornsSub: tx.acornsSub || "Checking",
        ...(tx.isSplit && { split: {
          cash: cents(tx.splitCash), acorns: cents(tx.splitAcorns),
          acornsSub: tx.splitAcornsSub || "Checking",
          expenses: cents(tx.splitExpenses), expenseDesc: tx.splitExpenseDesc
        }})
      };
    });

    const reminders = queue.filter(tx => tx.emailReminder).map(tx => ({
      desc: tx.description,
      amt: tx.isIncome ? Math.abs(parseFloat(tx.amount)) : -Math.abs(parseFloat(tx.amount)),
      notes: tx.emailNotes
    }));

    let success = false;
    let emailSent = false;

    if (scriptUrl) {
      // ── POST to Google Sheet ──
      try {
        const payload = { transactions };
        if (reminders.length > 0 && reminderEmail) {
          payload.reminders = reminders;
          payload.reminderEmail = reminderEmail;
        }
        const res = await fetch(scriptUrl, { method: "POST", body: JSON.stringify(withTok(payload)) });
        const result = await res.json();
        if (result.success && result.state) {
          // Merge (don't wholesale-replace): doPost returns a partial state without
          // statementPeriods, so preserve the periods the GET sync loaded (else the
          // statement-period dropdowns go empty until reload).
          const merged = Object.assign({}, result.state, { statementPeriods: result.state.statementPeriods || state.statementPeriods });
          setState(merged);
          save(SK.state, merged);
          success = true;
          emailSent = !!result.emailSent;
        } else {
          flash("Sheet error: " + (result.error || "Unknown error"), true);
        }
      } catch (err) {
        flash("Could not reach Google Sheet: " + err.message, true);
      }
    } else {
      // ── Local-only fallback ──
      const ns = { ...state };
      queue.forEach(tx => {
        if (tx.type === "Transfer") {
          const a = Math.abs(parseFloat(tx.amount));
          if (tx.transferDir === "chase-to-acorns-general") {
            ns.lastCH++; ns.lastAC++; ns.chaseBalance -= a; ns.acornsBalance += a;
          } else if (tx.transferDir === "acorns-general-to-chase") {
            ns.lastAC++; ns.lastCH++; ns.acornsBalance -= a; ns.chaseBalance += a;
          } else { // acorns-general-to-checking
            ns.lastAC += 2; ns.acornsChecking += a;
          }
          return;
        }
        const amt = tx.isIncome ? Math.abs(parseFloat(tx.amount)) : -Math.abs(parseFloat(tx.amount));
        ns.lastRR++;
        if (tx.account === "Chase") { ns.lastCH++; ns.chaseBalance += amt; }
        else { ns.lastAC++; ns.acornsBalance += amt; }
        ns.grandTotal += amt;
      });
      setState(ns);
      save(SK.state, ns);
      success = true;
    }

    setProcessing(false);
    if (!success) return;

    // Local history
    const processed = queue.map(tx => {
      if (tx.type === "Transfer") {
        const dir = (TRANSFER_DIRS.find(d => d.value === tx.transferDir) || {}).label || tx.transferDir;
        return { rrNum: "", acctNum: dir, account: "Transfer", type: "Transfer",
          date: tx.date, spender: "", description: tx.description,
          amount: Math.abs(parseFloat(tx.amount)),
          notes: tx.notes, processedAt: new Date().toISOString() };
      }
      const amt = tx.isIncome ? Math.abs(parseFloat(tx.amount)) : -Math.abs(parseFloat(tx.amount));
      return { rrNum: tx.rrNum, acctNum: tx.acctNum, account: tx.account, type: tx.type,
        date: tx.date, spender: tx.spender, description: tx.description, amount: amt,
        notes: tx.notes, processedAt: new Date().toISOString() };
    });
    const newHist = [...history, ...processed];
    setHistory(newHist);
    save(SK.history, newHist);

    // Remember this batch so it can be undone (reversed) right after processing
    if (scriptUrl) setLastBatch({ items: transactions, rrNums: processed.map(p => p.rrNum), at: Date.now() });

    // Email reminder status
    if (reminders.length > 0 && !reminderEmail) {
      flash("Processed! Set a reminder email in Settings to send reminders.", true);
      setQueue([]);
      return;
    }

    const n = queue.length;
    const emailMsg = emailSent ? " ✉️ Reminder sent!" : "";
    flash(n + " transaction" + (n !== 1 ? "s" : "") + (scriptUrl ? " saved — the lake house thanks you 🚤" : " processed!") + emailMsg);
    setQueue([]);
  };

  /* ── Undo last batch — append reversing (contra) entries ── */
  const undoLastBatch = async () => {
    if (!lastBatch || !scriptUrl) return;
    const items = lastBatch.items || [];
    if (items.some(t => t.type === "Transfer" || t.split)) {
      flash("This batch includes a split or transfer — please reverse it directly in the sheet.", true);
      return;
    }
    if (!window.confirm("Undo the last batch? This appends reversing entries for " + items.length + " transaction(s) — it does not delete anything.")) return;
    const today = new Date().toISOString().split("T")[0];
    const reversals = items.map((t, i) => {
      const rr = (lastBatch.rrNums && lastBatch.rrNums[i]) || "";
      return {
        account: t.account, type: t.type, date: today, spender: t.spender || "",
        description: "Reversal" + (rr ? " of " + rr : "") + (t.description ? ": " + t.description : ""),
        amount: -t.amount, notes: "Auto-reversal", acornsSub: t.acornsSub || "Checking"
      };
    });
    setProcessing(true);
    try {
      const res = await fetch(scriptUrl, { method: "POST", body: JSON.stringify(withTok({ transactions: reversals })) });
      const result = await res.json();
      if (result.success && result.state) {
        const merged = Object.assign({}, result.state, { statementPeriods: result.state.statementPeriods || state.statementPeriods });
        setState(merged); save(SK.state, merged);
        const revHist = reversals.map((rv, i) => ({
          rrNum: ((result.results || [])[i] || {}).rrNum || "", acctNum: ((result.results || [])[i] || {}).acctNum || "",
          account: rv.account, type: rv.type, date: rv.date, spender: rv.spender,
          description: rv.description, amount: rv.amount, notes: rv.notes, processedAt: new Date().toISOString()
        }));
        const nh = [...history, ...revHist]; setHistory(nh); save(SK.history, nh);
        setLastBatch(null);
        flash("Reversed " + reversals.length + " entr" + (reversals.length === 1 ? "y" : "ies") + ".");
      } else { flash("Undo failed: " + (result.error || "unknown error"), true); }
    } catch (e) { flash("Undo failed: " + e.message, true); }
    setProcessing(false);
  };

  /* ── This month's bills checklist ────────────────────── */
  const loadBills = async () => {
    if (billsView.open) { setBillsView(v => ({ ...v, open: false })); return; }
    if (!scriptUrl) { setBillsView({ open: true, loading: false, found: {}, error: "Connect a Google Sheet in Settings to use the checklist." }); return; }
    setBillsView({ open: true, loading: true, found: {}, error: null });
    const now = new Date();
    const first = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0") + "-01";
    const today = now.toISOString().split("T")[0];
    try {
      const res = await fetch(scriptUrl, { method: "POST",
        body: JSON.stringify(withTok({ action: "queryTransactions", categories: ["all"], startDate: first, endDate: today })) });
      const result = await res.json();
      if (!result || result.success === false) { setBillsView({ open: true, loading: false, found: {}, error: (result && result.error) || "Could not load this month's transactions." }); return; }
      const txns = result.transactions || [];
      const found = {};
      MONTHLY_BILLS.forEach(b => {
        found[b.label] = txns.some(t => {
          if (b.match.type && (t.type || "") !== b.match.type) return false;
          if (b.match.desc && (t.description || "").toLowerCase().indexOf(b.match.desc) < 0) return false;
          return true;
        });
      });
      setBillsView({ open: true, loading: false, found: found, error: null });
    } catch (e) { setBillsView({ open: true, loading: false, found: {}, error: "Could not reach the sheet: " + e.message }); }
  };

  /* ── Close Statement (writes to Statements sheet) ────── */
  const [closingStatement, setClosingStatement] = useState(false);
  const [pdfState, setPdfState] = useState("idle");
  const [emailState, setEmailState] = useState("idle");
  const [pdfData, setPdfData] = useState(null);
  const [txBrowserView, setTxBrowserView] = useState(null);
  const [monthlyGroup, setMonthlyGroup] = useState("statement"); // "calendar" | "statement"
  const [txBrowserFilters, setTxBrowserFilters] = useState({
    categories: ["all"], startDate: "", endDate: new Date().toISOString().split("T")[0], allTime: false
  });
  const [catMenuOpen, setCatMenuOpen] = useState(false);
  const [txCatSummaryView, setTxCatSummaryView] = useState(null);
  const [ownerDashView, setOwnerDashView] = useState(null);
  const [taxPackView, setTaxPackView] = useState(null);
  const [taxEmailState, setTaxEmailState] = useState("idle");
  const [reportEmails, setReportEmails] = useState("gdgilbert@gmail.com");
  const [reportEmailState, setReportEmailState] = useState("idle");

  const closeStatement = async () => {
    if (!scriptUrl) { flash("Set your Script URL in Settings first.", true); return; }
    setClosingStatement(true);
    try {
      const today = new Date().toISOString().split("T")[0]; // YYYY-MM-DD
      const res = await fetch(scriptUrl, {
        method: "POST",
        body: JSON.stringify(withTok({ action: "closeMonth", endDate: today }))
      });
