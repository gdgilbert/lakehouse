function useIsMobile(breakpoint = 600) {
  const [mobile, setMobile] = useState(window.innerWidth <= breakpoint);
  useEffect(() => {
    const onResize = () => setMobile(window.innerWidth <= breakpoint);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [breakpoint]);
  return mobile;
}

/* ── localStorage helpers ────────────────────────────────── */
const SK = { state: "lh_state", history: "lh_history", email: "lh_email", script: "lh_script" };

/* ── Formatting helpers ──────────────────────────────────── */
const formatMoney = (n) => {
  const abs = Math.abs(n);
  const formatted = "$" + abs.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  return n < 0 ? "(" + formatted + ")" : formatted;
};
const padNum = (prefix, num) => prefix + String(num).padStart(3, "0");
const fmtDate = (d) => { const p = d.split("-"); return p[1] + "/" + p[2] + "/" + p[0]; };

/* ── PDF + Email generators for Close Statement ────────── */

function generateStatementPDF(cv) {
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ unit: "mm", format: "letter" });
  var W = 215.9, mL = 18, mR = 18, cW = W - mL - mR;
  var y = 20;
  var fmtM = formatMoney;

  // Helpers
  var center = function(text, size, style) {
    doc.setFontSize(size); doc.setFont("helvetica", style || "normal");
    doc.text(text, W / 2, y, { align: "center" }); y += size * 0.45;
  };
  var hr = function() { doc.setDrawColor(200); doc.line(mL, y, W - mR, y); y += 4; };
  var box = function(fillR, fillG, fillB, h) {
    doc.setFillColor(fillR, fillG, fillB); doc.rect(mL, y, cW, h, "F");
  };
  // Table row: label (left), val1 (right col 1), val2 (right col 2)
  var col1X = W - mR - 60, col2X = W - mR - 5;
  var tRow = function(label, v1, v2, opts) {
    opts = opts || {};
    if (opts.bg) { doc.setFillColor(opts.bg[0], opts.bg[1], opts.bg[2]); doc.rect(mL, y - 4, cW, 7, "F"); }
    doc.setFont("helvetica", opts.bold ? "bold" : "normal");
    doc.setFontSize(opts.size || 10);
    doc.setTextColor(opts.color ? opts.color[0] : 30, opts.color ? opts.color[1] : 30, opts.color ? opts.color[2] : 30);
    doc.text(opts.indent ? "     " + label : label, mL + 2, y);
    if (v1) doc.text(v1, col1X, y, { align: "right" });
    if (v2) { doc.setTextColor(100, 116, 139); doc.text(v2, col2X, y, { align: "right" }); }
    doc.setTextColor(30, 30, 30);
    y += 7;
  };

  // ── Title ──
  doc.setTextColor(26, 26, 46);
  center("Rough River Lake House", 20, "bold"); y += 2;
  center("Monthly Statement", 14, "bold"); y += 1;
  doc.setTextColor(100, 116, 139);
  center(cv.startDate + "  \u2013  " + cv.endDate, 11); y += 6;

  // ── Starting Balance ──
  box(248, 250, 252, 10);
  doc.setTextColor(100, 116, 139); doc.setFontSize(9); doc.setFont("helvetica", "normal");
  doc.text("STARTING BALANCE  " + cv.startDate, mL + 3, y + 6.5);
  doc.setTextColor(30, 30, 30); doc.setFontSize(14); doc.setFont("helvetica", "bold");
  doc.text(fmtM(cv.startingBalance), W - mR - 3, y + 7, { align: "right" });
  y += 14;

  // ── Column headers ──
  doc.setFontSize(8); doc.setFont("helvetica", "bold"); doc.setTextColor(100, 116, 139);
  doc.text("This Month", col1X, y, { align: "right" });
  doc.text("Fiscal YTD", col2X, y, { align: "right" });
  y += 6;

  // ── Income ──
  tRow("Total Income", fmtM(cv.totalIncome), fmtM(cv.fyTotalIncome),
    { bold: true, color: [22, 163, 74], bg: [240, 253, 244] });
  Object.keys(cv.monthIncome || {}).forEach(function(k) {
    tRow(k, fmtM(cv.monthIncome[k]), fmtM(cv.fyIncome[k]), { indent: true });
  });
  y += 3;

  // ── Expenses ──
  tRow("Total Expenses", fmtM(cv.totalExpense), fmtM(cv.fyTotalExpense),
    { bold: true, color: [220, 38, 38], bg: [254, 242, 242] });
  Object.keys(cv.monthExpense || {}).forEach(function(k) {
    tRow(k, fmtM(Math.abs(cv.monthExpense[k])), fmtM(Math.abs(cv.fyExpense[k])), { indent: true });
  });
  y += 3;

  // ── Net ──
  hr();
  var netColor = cv.net >= 0 ? [22, 163, 74] : [220, 38, 38];
  tRow("TOTAL MONTHLY NET", fmtM(cv.net), "", { bold: true, size: 11, color: netColor });
  y += 4;

  // ── Ending Balance ──
  var ebColor = cv.endingBalance >= 0 ? [22, 163, 74] : [220, 38, 38];
  box(248, 250, 252, 10);
  doc.setTextColor(100, 116, 139); doc.setFontSize(9); doc.setFont("helvetica", "normal");
  doc.text("ENDING BALANCE  " + cv.endDate, mL + 3, y + 6.5);
  doc.setTextColor(ebColor[0], ebColor[1], ebColor[2]); doc.setFontSize(14); doc.setFont("helvetica", "bold");
  doc.text(fmtM(cv.endingBalance), W - mR - 3, y + 7, { align: "right" });
  y += 16;

  // ── YTD Profit / Loss ──
  var ytdPL = ((cv.fyIncome["Rental Income"] || 0) + (cv.fyIncome["Interest"] || 0) + cv.endingBalance)
            - ((cv.fyIncome["Monthly Contribution"] || 0) + Math.abs(cv.fyTotalExpense));
  var plColor = ytdPL >= 0 ? [22, 163, 74] : [220, 38, 38];
  doc.setFillColor(254, 243, 199); doc.rect(mL, y, cW, 20, "F");
  doc.setDrawColor(245, 158, 11); doc.rect(mL, y, cW, 20, "S");
  doc.setTextColor(146, 64, 14); doc.setFontSize(8); doc.setFont("helvetica", "bold");
  doc.text("YEAR TO DATE ACTUAL PROFIT / LOSS", W / 2, y + 5, { align: "center" });
  doc.setTextColor(plColor[0], plColor[1], plColor[2]); doc.setFontSize(18); doc.setFont("helvetica", "bold");
  doc.text(fmtM(ytdPL), W / 2, y + 13, { align: "center" });
  doc.setTextColor(146, 64, 14); doc.setFontSize(7); doc.setFont("helvetica", "normal");
  doc.text("(YTD Rental Income + YTD Interest + Ending Balance) - (YTD Contributions + YTD Expenses)", W / 2, y + 18, { align: "center" });
  y += 26;

  // ── Footer ──
  doc.setTextColor(148, 163, 184); doc.setFontSize(9); doc.setFont("helvetica", "normal");
  doc.text(cv.txCount + " transaction" + (cv.txCount !== 1 ? "s" : "") + " in this period", W / 2, y, { align: "center" });
  y += 5;
  doc.text("Generated: " + new Date().toLocaleString(), W / 2, y, { align: "center" });
  y += 5;
  doc.setFontSize(8);
  doc.text("Rough River Lake House Transaction System", W / 2, y, { align: "center" });

  var filename = "LakeHouse_Statement_" + cv.endDate.replace(/\//g, "-") + ".pdf";
  return { base64: doc.output("datauristring").split(",")[1], filename: filename, doc: doc };
}

    '</div>' +
    // Starting Balance
    '<div style="background:#f8fafc;padding:16px;border-bottom:1px solid #e2e8f0;">' +
      '<table width="100%" style="border-collapse:collapse;"><tr>' +
        '<td style="font-size:11px;color:#64748b;text-transform:uppercase;">Starting Balance &nbsp; ' + cv.startDate + '</td>' +
        '<td style="text-align:right;font-size:18px;font-weight:bold;">' + fmtM(cv.startingBalance) + '</td>' +
      '</tr></table>' +
    '</div>' +
    // Column headers
    '<table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;">' +
      '<tr style="background:#f1f5f9;">' +
        '<td style="padding:6px 8px;font-size:11px;color:#64748b;font-weight:bold;"></td>' +
        '<td style="text-align:right;padding:6px 8px;font-size:11px;color:#64748b;font-weight:bold;">This Month</td>' +
        '<td style="text-align:right;padding:6px 8px;font-size:11px;color:#64748b;font-weight:bold;">Fiscal YTD</td>' +
      '</tr>' +
    // Income
      '<tr style="background:#f0fdf4;">' +
        '<td style="padding:8px;font-weight:bold;color:#16a34a;">Total Income</td>' +
        '<td style="text-align:right;padding:8px;font-weight:bold;color:#16a34a;">' + fmtM(cv.totalIncome) + '</td>' +
        '<td style="text-align:right;padding:8px;font-style:italic;color:#64748b;">' + fmtM(cv.fyTotalIncome) + '</td>' +
      '</tr>' + incomeRows +
    // Expenses
      '<tr style="background:#fef2f2;">' +
        '<td style="padding:8px;font-weight:bold;color:#dc2626;">Total Expenses</td>' +

    '</table>' +
    // Net
    '<div style="padding:12px 16px;border-top:2px solid #cbd5e1;">' +

  const [reminderEmail, setReminderEmail] = useState(() => {

  });
  const [closeMonthView, setCloseMonthView] = useState(null);
  const [scriptUrl, setScriptUrl] = useState(() => {
    try { return localStorage.getItem(SK.script) || ""; } catch { return ""; }
  });
  const [syncing, setSyncing] = useState(false);
  const [processing, setProcessing] = useState(false);
  const [expensePicker, setExpensePicker] = useState({ open: false, loading: false, expenses: [], selected: {} });

  // Persist settings
  useEffect(() => { try { localStorage.setItem(SK.email, reminderEmail); } catch {} }, [reminderEmail]);
  useEffect(() => { try { localStorage.setItem(SK.script, scriptUrl); } catch {} }, [scriptUrl]);

  // Sync state from Google Sheet on load
  useEffect(() => {
    const url = scriptUrl;
    if (!url) return;
    setSyncing(true);
    fetch(url).then(r => r.json()).then(data => {
      if (data.lastRR !== undefined) { setState(data); save(SK.state, data); }
    }).catch(() => {}).finally(() => setSyncing(false));
  }, []);

  const flash = (msg, warn) => { setToast({ msg, warn }); setTimeout(() => setToast(null), 3500); };
  const updateForm = (field, value) => setForm(f => ({...f, [field]: value}));
  const isIncomeType = (t) => ["Rental Income", "Interest", "Monthly Contribution"].includes(t);

  /* ── Validation ──────────────────────────────────────── */
  const validate = () => {
    if (!form.type) return "Select a transaction type";
    if (!form.date) return "Enter a date";
    if (!form.amount || isNaN(parseFloat(form.amount)) || parseFloat(form.amount) === 0) return "Enter a valid amount";
    if (!form.description) return "Enter a description";
    if (form.type === "Monthly Contribution" && form.isSplit) {
      const total = (parseFloat(form.splitCash)||0) + (parseFloat(form.splitAcorns)||0) + (parseFloat(form.splitExpenses)||0);
      if (Math.abs(total - parseFloat(form.amount)) > 0.01)
        return "Split amounts (" + formatMoney(total) + ") don't equal total (" + formatMoney(parseFloat(form.amount)) + ")";
    }
    return null;
  };

  /* ── Queue management ────────────────────────────────── */
  const addToQueue = () => {
    const err = validate();
    if (err) { alert(err); return; }
    if (form.type === "Transfer") {
      setQueue(q => [...q, { ...form, rrNum: "", acctNum: "", isIncome: false }]);
      setForm({...emptyForm});
      return;
    }
    const nonTransferCount = queue.filter(t => t.type !== "Transfer").length;
    const nextRR = state.lastRR + 1 + nonTransferCount;
    const isChase = form.account === "Chase";
    // Count CH/AC consumed by all queued items
    let chUsed = 0, acUsed = 0;
    queue.forEach(t => {
      if (t.type === "Transfer") {
        if (t.transferDir !== "acorns-general-to-checking") chUsed++;
        acUsed += t.transferDir === "acorns-general-to-checking" ? 2 : 1;
      } else {
        if (t.account === "Chase") chUsed++; else acUsed++;
      }
    });
    const nextAcct = isChase ? state.lastCH + 1 + chUsed : state.lastAC + 1 + acUsed;
    const resolvedIncome = form.signOverride ? form.signOverride === "income" : isIncomeType(form.type);
    setQueue(q => [...q, {
      ...form, rrNum: padNum("RR", nextRR),
      acctNum: isChase ? padNum("CH", nextAcct) : padNum("AC", nextAcct),
      isIncome: resolvedIncome,
    }]);
    setForm({...emptyForm});
  };

  const removeFromQueue = (index) => {
    setQueue(q => {
      const newQ = q.filter((_, i) => i !== index);
      let rrC = 0, chC = 0, acC = 0;
      return newQ.map(tx => {
        if (tx.type === "Transfer") {
          // Transfers consume CH/AC numbers but no RR
          if (tx.transferDir !== "acorns-general-to-checking") chC++;
          acC += tx.transferDir === "acorns-general-to-checking" ? 2 : 1;
          return { ...tx };
        }
        rrC++;
        const isChase = tx.account === "Chase";
        if (isChase) chC++; else acC++;
        return { ...tx, rrNum: padNum("RR", state.lastRR + rrC),
          acctNum: isChase ? padNum("CH", state.lastCH + chC) : padNum("AC", state.lastAC + acC) };
      });
    });
  };

  /* ── Process all — the big "Go" ──────────────────────── */
  const processAll = async () => {
    if (queue.length === 0) return;
    setProcessing(true);

    // Build transaction payload
    const transactions = queue.map(tx => {
      if (tx.type === "Transfer") {
        return {
          type: "Transfer", transferDir: tx.transferDir, date: tx.date,
          description: tx.description, amount: Math.abs(parseFloat(tx.amount)),
          notes: tx.notes || "",
        };
      }
      const amt = tx.isIncome ? Math.abs(parseFloat(tx.amount)) : -Math.abs(parseFloat(tx.amount));
      return {
        account: tx.account, type: tx.type, date: tx.date,
        spender: tx.spender, description: tx.description, amount: amt,
        notes: tx.notes || "",
        acornsSub: tx.acornsSub || "Checking",
        ...(tx.isSplit && { split: {
          cash: parseFloat(tx.splitCash)||0, acorns: parseFloat(tx.splitAcorns)||0,
          acornsSub: tx.splitAcornsSub || "Checking",
          expenses: parseFloat(tx.splitExpenses)||0, expenseDesc: tx.splitExpenseDesc
        }})
      };
    });

    const reminders = queue.filter(tx => tx.emailReminder).map(tx => ({
      desc: tx.description,
      amt: tx.isIncome ? Math.abs(parseFloat(tx.amount)) : -Math.abs(parseFloat(tx.amount)),
      notes: tx.emailNotes
    }));

    let success = false;
    let emailSent = false;

    if (scriptUrl) {
      // ── POST to Google Sheet ──
      try {
        const payload = { transactions };
        if (reminders.length > 0 && reminderEmail) {
          payload.reminders = reminders;
          payload.reminderEmail = reminderEmail;
        }
        const res = await fetch(scriptUrl, { method: "POST", body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.success && result.state) {
          setState(result.state);
          save(SK.state, result.state);
          success = true;
          emailSent = !!result.emailSent;
        } else {
          flash("Sheet error: " + (result.error || "Unknown error"), true);
        }
      } catch (err) {
        flash("Could not reach Google Sheet: " + err.message, true);
      }
    } else {
      // ── Local-only fallback ──
      const ns = { ...state };
      queue.forEach(tx => {
        if (tx.type === "Transfer") {
          const a = Math.abs(parseFloat(tx.amount));
          if (tx.transferDir === "chase-to-acorns-general") {
            ns.lastCH++; ns.lastAC++; ns.chaseBalance -= a; ns.acornsBalance += a;
          } else if (tx.transferDir === "acorns-general-to-chase") {
            ns.lastAC++; ns.lastCH++; ns.acornsBalance -= a; ns.chaseBalance += a;
          } else { // acorns-general-to-checking
            ns.lastAC += 2; ns.acornsChecking += a;
          }
          return;
        }
        const amt = tx.isIncome ? Math.abs(parseFloat(tx.amount)) : -Math.abs(parseFloat(tx.amount));
        ns.lastRR++;
        if (tx.account === "Chase") { ns.lastCH++; ns.chaseBalance += amt; }
        else { ns.lastAC++; ns.acornsBalance += amt; }
        ns.grandTotal += amt;
      });
      setState(ns);
      save(SK.state, ns);
      success = true;
    }

    setProcessing(false);
    if (!success) return;

    // Local history
    const processed = queue.map(tx => {
      if (tx.type === "Transfer") {
        const dir = (TRANSFER_DIRS.find(d => d.value === tx.transferDir) || {}).label || tx.transferDir;
        return { rrNum: "", acctNum: dir, account: "Transfer", type: "Transfer",
          date: tx.date, spender: "", description: tx.description,
          amount: Math.abs(parseFloat(tx.amount)),
          notes: tx.notes, processedAt: new Date().toISOString() };
      }
      const amt = tx.isIncome ? Math.abs(parseFloat(tx.amount)) : -Math.abs(parseFloat(tx.amount));
      return { rrNum: tx.rrNum, acctNum: tx.acctNum, account: tx.account, type: tx.type,
        date: tx.date, spender: tx.spender, description: tx.description, amount: amt,
        notes: tx.notes, processedAt: new Date().toISOString() };
    });
    const newHist = [...history, ...processed];
    setHistory(newHist);
    save(SK.history, newHist);

    // Email reminder status
    if (reminders.length > 0 && !reminderEmail) {
      flash("Processed! Set a reminder email in Settings to send reminders.", true);
      setQueue([]);
      return;
    }

    const n = queue.length;
    const emailMsg = emailSent ? " ✉️ Reminder sent!" : "";
    flash(n + " transaction" + (n !== 1 ? "s" : "") + (scriptUrl ? " saved to Sheet!" : " processed!") + emailMsg);
    setQueue([]);
  };

  /* ── Close Statement (writes to Statements sheet) ────── */
  const [closingStatement, setClosingStatement] = useState(false);
  const [pdfState, setPdfState] = useState("idle");
  const [emailState, setEmailState] = useState("idle");
  const [pdfData, setPdfData] = useState(null);
  const [txBrowserView, setTxBrowserView] = useState(null);
  const [txBrowserFilters, setTxBrowserFilters] = useState({
    category: "all", startDate: "", endDate: new Date().toISOString().split("T")[0]
  });
  const [txCatSummaryView, setTxCatSummaryView] = useState(null);

  const closeStatement = async () => {
    if (!scriptUrl) { flash("Set your Script URL in Settings first.", true); return; }
    setClosingStatement(true);
    try {
      const today = new Date().toISOString().split("T")[0]; // YYYY-MM-DD
      const res = await fetch(scriptUrl, {
        method: "POST",
        body: JSON.stringify({ action: "closeMonth", endDate: today })
      });
      const result = await res.json();
      if (result.success && result.statement) {
        const s = result.statement;
        setCloseMonthView({
          startDate: s.startDate,
          endDate: s.endDate,
          label: s.startDate + " \u2013 " + s.endDate,
          totalIncome: s.totalIncome,
          totalExpense: s.totalExpense,
          net: s.net,
          startingBalance: s.startingBalance,
          endingBalance: s.endingBalance,
          txCount: s.txCount,
          fyTotalIncome: s.fyTotalIncome,
          fyTotalExpense: s.fyTotalExpense,
          monthIncome: s.monthIncome || {},
          monthExpense: s.monthExpense || {},
          fyIncome: s.fyIncome || {},
          fyExpense: s.fyExpense || {},
        });
        flash("Statement written to Statements sheet!");
      } else {
        flash(result.error || "Unknown error closing statement.", true);
      }
    } catch (err) {
      flash("Could not reach Google Sheet: " + err.message, true);
    }
    setClosingStatement(false);
  };

  const handleGeneratePDF = () => {
    setPdfState("generating");
    try {
      const result = generateStatementPDF(closeMonthView);
      setPdfData(result);
      result.doc.save(result.filename);
      setPdfState("done");

      setPdfState("idle");

  };

  const handleSendEmail = async () => {
    if (!pdfData) { flash("Generate the PDF first.", true); return; }
    if (!scriptUrl) { flash("Set your Script URL in Settings first.", true); return; }
    setEmailState("sending");
    try {
      const htmlBody = generateStatementEmailHTML(closeMonthView);
      const subject = "Rough River Lake House -- Monthly Statement (" +
                      closeMonthView.startDate + " - " + closeMonthView.endDate + ")";
      const res = await fetch(scriptUrl, {
        method: "POST",
        body: JSON.stringify({
          action: "sendStatement",
          recipients: "kasgilbert@gmail.com, gilbertlumber@gmail.com, mogilbert1@gmail.com",
          subject: subject,
          htmlBody: htmlBody,
          pdfBase64: pdfData.base64,
          pdfFilename: pdfData.filename
        })
      });
      const result = await res.json();
      if (result.success) {
        setEmailState("sent");
        flash("Statement emailed to all recipients!");
      } else {
        flash("Email failed: " + (result.error || "Unknown error"), true);
        setEmailState("idle");
      }
    } catch (err) {
      flash("Could not send email: " + err.message, true);
      setEmailState("idle");
    }
  };

  /* ── Expense Picker (for split contributions) ─────── */
  const loadChaseExpenses = async () => {
    if (!scriptUrl) return;
    setExpensePicker(p => ({ ...p, open: true, loading: true }));
    try {
      const res = await fetch(scriptUrl, {
        method: "POST", body: JSON.stringify({ action: "recentChaseExpenses" })
      });
      const result = await res.json();
      if (result.success) {
        setExpensePicker(p => ({ ...p, expenses: result.expenses.reverse(), loading: false }));
      } else {
        setExpensePicker(p => ({ ...p, loading: false }));
      }
    } catch {
      setExpensePicker(p => ({ ...p, loading: false }));
    }
  };

  const toggleExpenseSelection = (chNum, amount) => {
    setExpensePicker(p => {
      const sel = { ...p.selected };
      if (sel[chNum]) delete sel[chNum]; else sel[chNum] = amount;
      return { ...p, selected: sel };
    });
  };

  const applyExpenseSelection = () => {
    const sel = expensePicker.selected;
    const chNums = Object.keys(sel).sort();
    const total = chNums.reduce((s, k) => s + Math.abs(sel[k]), 0);
    updateForm("splitExpenses", total.toFixed(2));
    updateForm("splitExpenseDesc", chNums.join(" and "));
    setExpensePicker({ open: false, loading: false, expenses: [], selected: {} });
  };

  /* ── Transaction Browser query ──────────────────────── */
  const queryTransactions = async (category, startDate, endDate) => {
    if (!scriptUrl) {
      setTxBrowserView(v => ({ ...v, results: null, loading: false,
        error: "Set your Script URL in Settings to use the Transaction Browser." }));
      return;
    }
    setTxBrowserView(v => ({ ...v, results: null, loading: true, error: null }));
    try {
      const res = await fetch(scriptUrl, {
        method: "POST",
        body: JSON.stringify({ action: "queryTransactions", category, startDate, endDate })
      });
      const result = await res.json();
      if (result.success) {
        setTxBrowserView(v => ({ ...v, results: result.transactions, loading: false }));
      } else {
        setTxBrowserView(v => ({ ...v, error: result.error || "Unknown error", loading: false }));
      }
    } catch (err) {
      setTxBrowserView(v => ({ ...v, error: "Could not reach Google Sheet: " + err.message, loading: false }));
    }
  };

  /* ── Category Summary query ───────────────────────────── */
  const queryCategorySummary = async (category) => {
    if (!scriptUrl) {
      setTxCatSummaryView({ category, periods: null, loading: false,
        error: "Set your Script URL in Settings to use this feature." });
      return;
    }
    setTxCatSummaryView({ category, periods: null, loading: true, error: null });
    try {
      const res = await fetch(scriptUrl, {
        method: "POST",
        body: JSON.stringify({ action: "categorySummary", category })
      });
      const result = await res.json();
      if (result.success) {
        setTxCatSummaryView(v => ({ ...v, periods: result.periods, loading: false }));
      } else {
        setTxCatSummaryView(v => ({ ...v, error: result.error || "Unknown error", loading: false }));
      }
    } catch (err) {
      setTxCatSummaryView(v => ({ ...v, error: "Could not reach Google Sheet: " + err.message, loading: false }));
    }
  };

  /* ── Derived values ──────────────────────────────────── */
  // Count CH/AC numbers consumed by all queued items (regular + transfers)
  let qCH = 0, qAC = 0;
  queue.forEach(t => {
    if (t.type === "Transfer") {
      if (t.transferDir !== "acorns-general-to-checking") qCH++;
      qAC += t.transferDir === "acorns-general-to-checking" ? 2 : 1;
    } else {
      if (t.account === "Chase") qCH++; else qAC++;
    }
  });
  const currentRR = padNum("RR", state.lastRR + 1 + queue.filter(t => t.type !== "Transfer").length);
  const currentAcct = form.account === "Chase"
    ? padNum("CH", state.lastCH + 1 + qCH)
    : padNum("AC", state.lastAC + 1 + qAC);

  const projectedTotal = queue.reduce((sum, tx) => {
    const amt = tx.isIncome ? Math.abs(parseFloat(tx.amount)) : -Math.abs(parseFloat(tx.amount));
    return sum + amt;
  }, state.grandTotal);

  /* ── Shared styles ───────────────────────────────────── */
  const is = { width: "100%", padding: "8px 12px", borderRadius: 8, border: "1px solid #d1d5db", fontSize: 14, boxSizing: "border-box", outline: "none" };
  const ls = { display: "block", fontSize: 12, fontWeight: 600, color: "#555", marginBottom: 4 };
  const bp = { padding: "10px 24px", background: "#2563eb", color: "white", border: "none", borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: "pointer" };

  /* ── Category Summary renderer ────────────────────────── */
  const renderCategorySummary = () => {
    const cv = txCatSummaryView;
    const isExpense = !["Rental Income", "Interest", "Monthly Contribution"].includes(cv.category);
    const total = cv.periods ? cv.periods.reduce((s, p) => s + p.monthAmount, 0) : 0;

    // Convert statement date MM/DD/YYYY to YYYY-MM-DD for queries
    const toISO = (s) => { const p = s.split("/"); return p[2] + "-" + p[0] + "-" + p[1]; };

    // Derive a period label from the bulk month (the calendar month with the most days in the range)
    const monthLabel = (startDate, endDate) => {
      try {
        const names = ["January","February","March","April","May","June","July","August","September","October","November","December"];
        const sp = startDate.split("/"), ep = endDate.split("/");
        const s = new Date(+sp[2], +sp[0] - 1, +sp[1]);
        const e = new Date(+ep[2], +ep[0] - 1, +ep[1]);
        // Count days per month
        const counts = {};
        for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
          const key = d.getFullYear() + "-" + d.getMonth();
          counts[key] = (counts[key] || 0) + 1;
        }
        // Find month with most days
        let best = "", max = 0;
        for (const k in counts) { if (counts[k] > max) { max = counts[k]; best = k; } }
        const [yr, mo] = best.split("-");
        return names[+mo] + " " + yr;
      } catch(e) { return endDate; }
    };

    return React.createElement("div", null,
      // Back
      React.createElement("button", {
        onClick: () => setTxCatSummaryView(null),
        style: { background: "none", border: "none", color: "rgba(255,255,255,0.7)", fontSize: 14, cursor: "pointer", padding: "8px 0", marginBottom: 12 }
      }, "\u2190 Back"),
      // Title
      React.createElement("h2", {
        style: { color: "white", fontSize: 20, fontWeight: 700, marginBottom: 16, textShadow: "0 1px 4px rgba(0,0,0,0.5)" }
      }, "\uD83D\uDCCA " + cv.category + " \u2014 Fiscal Year Summary"),
      // Error
      cv.error && React.createElement("div", {
        style: { background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: 14, color: "#dc2626", fontSize: 13, marginBottom: 16 }
      }, cv.error),
      // Loading
      cv.loading && React.createElement("div", {
        style: { textAlign: "center", padding: 40, color: "rgba(255,255,255,0.6)", fontSize: 14 }
      }, "Loading statement periods..."),
      // Results
      cv.periods && !cv.loading && React.createElement("div", {
        style: { background: "white", borderRadius: 12, padding: 16, boxShadow: "0 4px 16px rgba(0,0,0,0.25)" }
      },
        React.createElement("div", { style: { fontSize: 13, color: "#64748b", marginBottom: 12 } },
          cv.periods.length + " statement period" + (cv.periods.length !== 1 ? "s" : "") + " found"),
        // Table header (desktop only)
        !isMobile && cv.periods.length > 0 && React.createElement("div", {
          style: { display: "grid", gridTemplateColumns: "1fr 120px 100px", gap: 8, padding: "8px 12px",
            background: "#f1f5f9", borderRadius: "6px 6px 0 0", fontWeight: 700, fontSize: 12, color: "#64748b" }
        },
          React.createElement("div", null, "Period"),
          React.createElement("div", null, "Date Range"),
          React.createElement("div", { style: { textAlign: "right" } }, "Amount")
        ),
        // Rows
        ...cv.periods.map((p, i) => {
          var amtColor = isExpense ? (p.monthAmount > 0 ? "#dc2626" : "#64748b") : (p.monthAmount > 0 ? "#16a34a" : "#64748b");
          var amtText = formatMoney(isExpense ? -p.monthAmount : p.monthAmount);
          var clickHandler = () => {
              const sd = toISO(p.startDate), ed = toISO(p.endDate);
              setTxBrowserFilters({ category: cv.category, startDate: sd, endDate: ed });
              setTxBrowserView({ category: cv.category, startDate: sd, endDate: ed,
                results: null, loading: false, error: null, sortCol: null, sortDir: "asc" });
              queryTransactions(cv.category, sd, ed);
          };
          return isMobile
          ? React.createElement("div", { key: i, onClick: clickHandler,
              style: { display: "flex", justifyContent: "space-between", alignItems: "center",
                padding: "12px 0", borderBottom: "1px solid #f1f5f9", cursor: "pointer" }
            },
              React.createElement("div", null,
                React.createElement("div", { style: { fontWeight: 600, color: "#1e293b", fontSize: 14 } }, monthLabel(p.startDate, p.endDate)),
                React.createElement("div", { style: { fontSize: 11, color: "#94a3b8", marginTop: 2 } }, p.startDate + " \u2013 " + p.endDate)
              ),
              React.createElement("div", { style: { fontWeight: 600, fontSize: 15, color: amtColor } }, amtText)
            )
          : React.createElement("div", { key: i, onClick: clickHandler,
              style: { display: "grid", gridTemplateColumns: "1fr 120px 100px", gap: 8, padding: "10px 12px",
                fontSize: 13, borderBottom: "1px solid #f1f5f9", background: i % 2 === 0 ? "#fff" : "#fafafa",
                cursor: "pointer", transition: "background 0.1s" }
            },
              React.createElement("div", { style: { fontWeight: 600, color: "#1e293b" } }, monthLabel(p.startDate, p.endDate)),
              React.createElement("div", { style: { fontSize: 11, color: "#64748b" } }, p.startDate + " \u2013 " + p.endDate),
              React.createElement("div", { style: { textAlign: "right", fontWeight: 600, color: amtColor } }, amtText)
            );
        }),
        // Empty
        cv.periods.length === 0 && React.createElement("div", {
          style: { textAlign: "center", padding: 30, color: "#94a3b8", fontSize: 13 }
        }, "No statement periods found."),
        // Total
        cv.periods.length > 0 && React.createElement("div", {
          style: { display: "flex", justifyContent: "space-between", padding: "12px " + (isMobile ? "0" : "12px"),
            borderTop: "2px solid #e2e8f0", fontWeight: 700, fontSize: 14, marginTop: 4 }
        },
          React.createElement("div", null, "Fiscal Year Total"),
          React.createElement("div", { style: { textAlign: "right",
            color: isExpense ? "#dc2626" : "#16a34a" } },
            formatMoney(isExpense ? -total : total))
        ),
        // Hint
        React.createElement("div", { style: { fontSize: 11, color: "#94a3b8", textAlign: "center", marginTop: 10 } },
          "Click a period to see individual transactions")
      )
    );
  };

  /* ── Transaction Browser renderer ─────────────────────── */
  const renderTransactionBrowser = () => {
    const tv = txBrowserView;
    const sorted = tv.results ? [...tv.results].sort((a, b) => {
      if (!tv.sortCol) return 0;
      let va = a[tv.sortCol], vb = b[tv.sortCol];
      if (tv.sortCol === "amount") return tv.sortDir === "asc" ? va - vb : vb - va;
      if (tv.sortCol === "date") {
        const pD = (s) => { const p = s.split("/"); return new Date(+p[2], +p[0]-1, +p[1]); };
        return tv.sortDir === "asc" ? pD(va) - pD(vb) : pD(vb) - pD(va);
      }
      va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
      return tv.sortDir === "asc" ? va.localeCompare(vb) : vb.localeCompare(va);
    }) : [];
