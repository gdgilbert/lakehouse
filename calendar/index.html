<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

/* ════════════════════════════════════════════════════════════
 *  CONFIG — paste your deployed Apps Script Web App URL here.
 *  (You can also set/override it in-app via the ⚙ Settings panel.)
 * ════════════════════════════════════════════════════════════ */
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbx1GcnCTQ5n2Rf4rXKFqfNAzmD1NnJO4DpX8fXZpT-FDfEDgQRAMQ2y0_cBHSb0EDSo/exec";

/* ── Sample data so the page is usable before the backend is wired ── */
function isoShift(days) {
  const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate() + days);
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
const SAMPLE = {
  ok: true, sample: true, feeds: ["Airbnb","VRBO"], errors: [],
  generatedAt: new Date().toISOString(),
  blocks: [{ uid:"b1", platform:"Airbnb", checkIn: isoShift(20), checkOut: isoShift(23), isBlock:true }],
  stays: [
    { uid:"s1", platform:"Airbnb", checkIn: isoShift(-3), checkOut: isoShift(2), phone4:"4821", link:"", nights:5 },
    { uid:"s2", platform:"VRBO",   checkIn: isoShift(2),  checkOut: isoShift(6), phone4:"0099", link:"", nights:4 }, // turnaround on day +2
    { uid:"s3", platform:"Airbnb", checkIn: isoShift(9),  checkOut: isoShift(12), phone4:"7310", link:"", nights:3, early:true, earlyTime:"11am" },
    { uid:"s4", platform:"VRBO",   checkIn: isoShift(14), checkOut: isoShift(17), phone4:"5567", link:"", nights:3 },
  ],
};

/* ── Date helpers (local, no timezone drift) ─────────────── */
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function parseISO(s) { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); }
function toISO(dt) { return dt.getFullYear() + "-" + String(dt.getMonth()+1).padStart(2,"0") + "-" + String(dt.getDate()).padStart(2,"0"); }
function fmtLong(s) { const d = parseISO(s); return DOW[d.getDay()] + " " + MONTHS[d.getMonth()].slice(0,3) + " " + d.getDate(); }
function fmtFull(s) { const d = parseISO(s); return DOW[d.getDay()] + ", " + MONTHS[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear(); }
const todayISO = toISO(new Date());

/* Process raw payload: compute turnarounds client-side too (defensive), index by date. */
function useDerived(stays) {
  return useMemo(() => {
    const list = (stays || []).slice().sort((a,b) => a.checkIn < b.checkIn ? -1 : 1);
    const inDates = {}, outDates = {};
    list.forEach(s => { if (s.checkIn) inDates[s.checkIn] = true; if (s.checkOut) outDates[s.checkOut] = true; });
    list.forEach(s => {
      s._turn = !!((s.checkOut && inDates[s.checkOut]) || (s.checkIn && outDates[s.checkIn]) || s.sameDayTurnaround);
    });
    // Map each calendar date -> what happens on it.
    const byDate = {};
    const touch = (iso) => (byDate[iso] = byDate[iso] || { ins:[], outs:[], occupied:false, turn:false, early:false });
    list.forEach(s => {
      if (s.checkIn)  { const c = touch(s.checkIn);  c.ins.push(s);  if (s.early) c.early = true; }
      if (s.checkOut) { const c = touch(s.checkOut); c.outs.push(s); }
      // occupied nights: checkIn .. checkOut-1
      if (s.checkIn && s.checkOut) {
        let d = parseISO(s.checkIn); const end = parseISO(s.checkOut);
        while (d < end) { touch(toISO(d)).occupied = true; d.setDate(d.getDate()+1); }
      }
    });
    Object.keys(byDate).forEach(k => { if (inDates[k] && outDates[k]) byDate[k].turn = true; });
    return { list, byDate };
  }, [stays]);
}

/* ── Toast hook ──────────────────────────────────────────── */
function useToast() {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, kind="ok") => {
    setToast({ msg, kind }); setTimeout(() => setToast(null), 2600);
  }, []);
  const node = toast ? <div className={"toast toast-" + toast.kind}>{toast.msg}</div> : null;
  return [node, show];
}

/* ════════════════════════════ App ════════════════════════ */
function App() {
  const [backend, setBackend] = useState(() => localStorage.getItem("cal_backend") || BACKEND_URL);
  const [ownerCode, setOwnerCode] = useState(() => localStorage.getItem("cal_owner") || "");
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState("");
  const [tab, setTab] = useState("calendar");
  const [month, setMonth] = useState(() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); });
  const [selected, setSelected] = useState(null);   // {iso} or {stay}
  const [showSettings, setShowSettings] = useState(false);
  const [toastNode, toast] = useToast();
  const ownerMode = !!ownerCode;

  const load = useCallback(async (opts={}) => {
    if (!backend) { setData(SAMPLE); setLoading(false); return; }
    if (!opts.silent) setLoading(true);
    setErr("");
    try {
      const url = backend + (backend.indexOf("?") >= 0 ? "&" : "?") + "v=1" + (opts.refresh ? "&refresh=1" : "");
      const res = await fetch(url);
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || "Backend error");
      setData(json);
    } catch (e) {
      setErr(String(e.message || e));
      setData(prev => prev || null);
    } finally { setLoading(false); }
  }, [backend]);

  useEffect(() => { load(); }, [load]);
  // Refresh on focus + every 5 min.
  useEffect(() => {
    const onFocus = () => load({ silent: true });
    window.addEventListener("focus", onFocus);
    const id = setInterval(() => load({ silent: true }), 300000);
    return () => { window.removeEventListener("focus", onFocus); clearInterval(id); };
  }, [load]);

  const stays = (data && data.stays) || [];
  const { list, byDate } = useDerived(stays);

  const upcoming = list.filter(s => (s.checkOut || s.checkIn) >= todayISO);
  const nextTurn = upcoming.find(s => s._turn && s.checkIn >= todayISO);
  const earlies = upcoming.filter(s => s.early && s.checkIn >= todayISO).length;

  const saveSettings = (b, o) => {
    setBackend(b); setOwnerCode(o);
    localStorage.setItem("cal_backend", b); localStorage.setItem("cal_owner", o);
    setShowSettings(false); toast("Settings saved");
  };

  const setEarly = async (stay, early, time) => {
    if (!backend) { // sample mode: just update locally
      setData(d => ({ ...d, stays: d.stays.map(s => s.uid === stay.uid ? { ...s, early, earlyTime: time } : s) }));
      toast(early ? "Marked early check-in" : "Cleared early flag"); return;
    }
    try {
      const res = await fetch(backend, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" }, // avoids CORS preflight
        body: JSON.stringify({ action:"setFlag", ownerCode, uid: stay.uid, early, time: time||"", note: stay.note||"" }),
      });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || "Failed");
      setData(d => ({ ...d, stays: d.stays.map(s => s.uid === stay.uid ? { ...s, early, earlyTime: time } : s) }));
      toast(early ? "Marked early check-in" : "Cleared early flag");
    } catch (e) { toast("Couldn't save: " + (e.message||e), "err"); }
  };

  return (
    <div className="wrap">
      {toastNode}
      <div className="app-head">
        <h1>🏠 Rough River Cleaning Calendar</h1>
        <div className="sub">Check-ins, check-outs & turnarounds — synced from Airbnb & VRBO</div>
        <div className="head-actions">
          <button className="icon-btn" onClick={() => load({ refresh: true })} disabled={loading}>
            <span className={loading ? "spin" : ""}>↻</span> {loading ? "Syncing…" : "Refresh"}
          </button>
          <button className="icon-btn" onClick={() => setShowSettings(true)}>⚙ Settings</button>
        </div>
      </div>

      {data && data.sample &&
        <div className="banner">👋 <b>Demo mode</b> — showing sample bookings. Add your Apps Script URL in ⚙ Settings to go live.</div>}
      {err && !data &&
        <div className="banner">⚠ Couldn't reach the calendar service. {err}</div>}
      {data && data.errors && data.errors.length > 0 &&
        <div className="banner">⚠ Some feeds had trouble: {data.errors.join("; ")}</div>}

      <div className="tabs">
        <button className={tab==="calendar"?"active":""} onClick={()=>setTab("calendar")}>📅 Calendar</button>
        <button className={tab==="list"?"active":""} onClick={()=>setTab("list")}>📋 List</button>
      </div>

      <div className="chips">
        <span className="chip">📥 <b>{upcoming.filter(s=>s.checkIn>=todayISO).length}</b> upcoming check-ins</span>
        <span className="chip">♻️ Next turnaround: <b>{nextTurn ? fmtLong(nextTurn.checkIn) : "none"}</b></span>
        {earlies > 0 && <span className="chip">⚡ <b>{earlies}</b> early check-in{earlies>1?"s":""}</span>}
      </div>

      {tab === "calendar"
        ? <CalendarView month={month} setMonth={setMonth} byDate={byDate} onPick={(iso)=>setSelected({iso})} />
        : <ListView list={list} onPick={(stay)=>setSelected({stay})} />}

      {selected &&
        <DetailSheet selected={selected} byDate={byDate} ownerMode={ownerMode}
          onClose={()=>setSelected(null)} onSetEarly={setEarly} />}

      {showSettings &&
        <SettingsSheet backend={backend} ownerCode={ownerCode}
          onClose={()=>setShowSettings(false)} onSave={saveSettings} />}
    </div>
  );
}

/* ── Calendar (month grid) ───────────────────────────────── */
function CalendarView({ month, setMonth, byDate, onPick }) {
  const y = month.getFullYear(), m = month.getMonth();
  const first = new Date(y, m, 1);
  const startPad = first.getDay();
  const gridStart = new Date(y, m, 1 - startPad);
  const cells = [];
  for (let i = 0; i < 42; i++) { const d = new Date(gridStart); d.setDate(gridStart.getDate()+i); cells.push(d); }
  // Trim trailing all-out-of-month week.
  const weeks = cells.length / 7;
  const used = (weeks === 6 && cells[35].getMonth() !== m) ? 35 : 42;

  return (
    <div className="card pad">
      <div className="monthbar">
        <button className="navbtn" onClick={()=>setMonth(new Date(y, m-1, 1))} aria-label="Previous month">‹</button>
        <h2>{MONTHS[m]} {y}</h2>
        <div style={{display:"flex", gap:"8px", alignItems:"center"}}>
          <button className="today-btn" onClick={()=>{const d=new Date(); setMonth(new Date(d.getFullYear(), d.getMonth(), 1));}}>Today</button>
          <button className="navbtn" onClick={()=>setMonth(new Date(y, m+1, 1))} aria-label="Next month">›</button>
        </div>
      </div>
      <div className="dow">{DOW.map(d => <span key={d}>{d}</span>)}</div>
      <div className="grid">
        {cells.slice(0, used).map((d, i) => {
          const iso = toISO(d);
          const info = byDate[iso];
          const outMonth = d.getMonth() !== m;
          const cls = ["cell-day"];
          if (outMonth) cls.push("out-month");
          if (iso === todayISO) cls.push("today");
          if (info && info.occupied) cls.push("occupied");
          const hasEvent = info && (info.ins.length || info.outs.length);
          if (hasEvent) cls.push("clickable");
          return (
            <div key={i} className={cls.join(" ")} onClick={hasEvent ? ()=>onPick(iso) : undefined}>
              <span className="num">{d.getDate()}</span>
              {info && info.turn && <div className="badge-dot"><span title="Same-day turnaround">♻️</span></div>}
              {info && info.outs.map((s,j) => <span key={"o"+j} className="pill out">OUT</span>)}
              {info && info.ins.map((s,j) => (
                <span key={"i"+j} className={"pill " + (s.early ? "early" : "in")}>
                  {s.early ? "⚡ IN" : "IN"}
                </span>
              ))}
            </div>
          );
        })}
      </div>
      <div className="legend">
        <span><i className="sw" style={{background:"var(--in-tint)"}}></i> Check-in</span>
        <span><i className="sw" style={{background:"var(--out-tint)"}}></i> Check-out</span>
        <span>♻️ Same-day turnaround (paid extra)</span>
        <span>⚡ Early check-in</span>
        <span><i className="sw" style={{background:"#eff5ff"}}></i> Booked night</span>
      </div>
    </div>
  );
}

/* ── List view ───────────────────────────────────────────── */
function ListView({ list, onPick }) {
  const upcoming = list.filter(s => (s.checkOut || s.checkIn) >= todayISO);
  const past = list.filter(s => (s.checkOut || s.checkIn) < todayISO).reverse();
  const render = (s) => {
    const isPast = (s.checkOut || s.checkIn) < todayISO;
    return (
      <button key={s.uid} className="stay" onClick={()=>onPick(s)}>
        <div className="accent" style={{background: s._turn ? "var(--turn)" : (s.early ? "var(--early)" : "var(--in)")}}></div>
        <div className="body">
          <div className="row1">
            <span className="dates">{fmtLong(s.checkIn)} → {fmtLong(s.checkOut)}</span>
            {s._turn && <span className="tag turn">♻ TURNAROUND</span>}
            {s.early && <span className="tag early">⚡ EARLY {s.earlyTime||""}</span>}
            {isPast && <span className="tag past">PAST</span>}
          </div>
          <div className="meta">
            <span className="tag plat">{s.platform}</span>
            {guestName(s) && <span>👤 {guestName(s)}</span>}
            <span>🌙 {s.nights || nightsOf(s)} night{(s.nights||nightsOf(s))===1?"":"s"}</span>
            {s.phone4 && <span>📞 ····{s.phone4}</span>}
          </div>
        </div>
      </button>
    );
  };
  return (
    <div>
      <div className="group-h">UPCOMING</div>
      {upcoming.length ? upcoming.map(render) : <div className="empty">No upcoming bookings yet.</div>}
      {past.length > 0 && <div className="group-h">RECENT (past)</div>}
      {past.map(render)}
    </div>
  );
}
function nightsOf(s) {
  if (!s.checkIn || !s.checkOut) return 0;
  return Math.round((parseISO(s.checkOut) - parseISO(s.checkIn)) / 86400000);
}
// VRBO puts the guest's first name in the summary ("Reserved - Melissa"); Airbnb doesn't.
function guestName(s) {
  if (!s || !s.summary) return "";
  var n = s.summary.replace(/reserved/i, "").replace(/^[\s:\-–—]+/, "").trim();
  if (!n || /not available|blocked|airbnb|vrbo|closed/i.test(n)) return "";
  return n;
}

/* ── Detail sheet ────────────────────────────────────────── */
function DetailSheet({ selected, byDate, ownerMode, onClose, onSetEarly }) {
  // Resolve which stays this refers to.
  let stays = [], dayISO = null;
  if (selected.stay) { stays = [selected.stay]; }
  else if (selected.iso) {
    dayISO = selected.iso;
    const info = byDate[selected.iso] || { ins:[], outs:[] };
    const seen = {};
    [...info.outs, ...info.ins].forEach(s => { if (!seen[s.uid]) { seen[s.uid]=true; stays.push(s); } });
  }
  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <button className="closebtn" onClick={onClose}>✕</button>
        <h3>{dayISO ? fmtFull(dayISO) : "Booking"}</h3>
        {dayISO && byDate[dayISO] && byDate[dayISO].turn &&
          <div className="tag turn" style={{display:"inline-block", marginTop:"6px"}}>♻ SAME-DAY TURNAROUND</div>}
        <div style={{marginTop:"10px"}}>
          {stays.map(s => <StayDetail key={s.uid} s={s} dayISO={dayISO} ownerMode={ownerMode} onSetEarly={onSetEarly} />)}
          {stays.length === 0 && <p style={{color:"var(--muted)", padding:"12px 0"}}>Nothing scheduled.</p>}
        </div>
      </div>
    </div>
  );
}

function StayDetail({ s, dayISO, ownerMode, onSetEarly }) {
  const [time, setTime] = useState(s.earlyTime || "");
  const role = dayISO === s.checkOut ? "Check-OUT" : (dayISO === s.checkIn ? "Check-IN" : "Staying");
  return (
    <div style={{marginBottom:"16px", paddingBottom:"6px", borderBottom:"2px solid var(--line)"}}>
      <div style={{display:"flex", gap:"8px", alignItems:"center", marginBottom:"4px", flexWrap:"wrap"}}>
        <span className="tag plat">{s.platform}</span>
        {dayISO && <span className={"tag " + (role==="Check-OUT"?"early":"turn")}>{role}</span>}
        {s._turn && <span className="tag turn">♻ Turnaround</span>}
      </div>
      {guestName(s) && <div className="kv"><span className="k">Guest</span><span className="v">{guestName(s)}</span></div>}
      <div className="kv"><span className="k">Check-in</span><span className="v">{fmtFull(s.checkIn)}{s.early && s.earlyTime ? "  ·  ⚡ "+s.earlyTime : ""}</span></div>
      <div className="kv"><span className="k">Check-out</span><span className="v">{fmtFull(s.checkOut)}</span></div>
      <div className="kv"><span className="k">Nights</span><span className="v">{s.nights || nightsOf(s)}</span></div>
      {s.phone4 && <div className="kv"><span className="k">Guest phone</span><span className="v">····{s.phone4}</span></div>}
      {s.link && <div className="kv"><span className="k">Reservation</span><span className="v"><a href={s.link} target="_blank" rel="noreferrer">Open ↗</a></span></div>}

      {ownerMode &&
        <div className="owner-box">
          <div className="switch-row">
            <div><b style={{fontSize:"14px"}}>⚡ Early check-in</b><div style={{fontSize:"12px", color:"var(--muted)"}}>Cleaner sees this flag</div></div>
            <label className="switch">
              <input type="checkbox" checked={!!s.early} onChange={e => onSetEarly(s, e.target.checked, time)} />
              <span className="slider"></span>
            </label>
          </div>
          {s.early &&
            <input className="field" placeholder="Time (e.g. 11am)" value={time}
              onChange={e=>setTime(e.target.value)} onBlur={()=>onSetEarly(s, true, time)} />}
        </div>}
    </div>
  );
}

/* ── Settings sheet ──────────────────────────────────────── */
function SettingsSheet({ backend, ownerCode, onClose, onSave }) {
  const [b, setB] = useState(backend);
  const [o, setO] = useState(ownerCode);
  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <button className="closebtn" onClick={onClose}>✕</button>
        <h3>⚙ Settings</h3>
        <p style={{color:"var(--muted)", fontSize:"13px", margin:"6px 0 14px"}}>The cleaner can leave the owner code blank — that's view-only.</p>
        <label style={{fontSize:"13px", fontWeight:600}}>Apps Script Web App URL</label>
        <input className="field" placeholder="https://script.google.com/macros/s/…/exec" value={b} onChange={e=>setB(e.target.value.trim())} />
        <label style={{fontSize:"13px", fontWeight:600, display:"block", marginTop:"14px"}}>Owner code <span style={{fontWeight:400, color:"var(--muted)"}}>(only Greg — unlocks early-check-in toggles)</span></label>
        <input className="field" type="password" placeholder="leave blank for view-only" value={o} onChange={e=>setO(e.target.value)} />
        <div style={{display:"flex", gap:"10px", marginTop:"18px"}}>
          <button className="btn-primary" style={{flex:1}} onClick={()=>onSave(b.trim(), o)}>Save</button>
          <button className="btn-ghost" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
