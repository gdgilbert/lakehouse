  @keyframes toastIn { from { transform: translate(-50%, -20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

/* ════════════════════════════════════════════════════════════
 *  CONFIG — deployed Apps Script Web App URL (overridable in ⚙ Settings).
 * ════════════════════════════════════════════════════════════ */
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbx1GcnCTQ5n2Rf4rXKFqfNAzmD1NnJO4DpX8fXZpT-FDfEDgQRAMQ2y0_cBHSb0EDSo/exec";

const DEFAULT_IN = "4p";    // default check-in time shown on bars
const DEFAULT_OUT = "11a";  // default check-out time shown on bars

/* ── Sample data (used only if no backend URL is set) ── */
function isoShift(days) { const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()+days);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
const SAMPLE = {
  ok: true, sample: true, feeds: ["Airbnb","VRBO"], errors: [], dateFlags: {},
  generatedAt: new Date().toISOString(),
  blocks: [{ uid:"b1", platform:"Airbnb", checkIn: isoShift(20), checkOut: isoShift(23), isBlock:true, note:"Family" }],
  stays: [
    { uid:"s1", platform:"Airbnb", checkIn: isoShift(-3), checkOut: isoShift(2), phone4:"4821", summary:"Reserved", nights:5 },
    { uid:"s2", platform:"VRBO",   checkIn: isoShift(2),  checkOut: isoShift(6), phone4:"", summary:"Reserved - Dana", nights:4, sameDayTurnaround:true },
    { uid:"s3", platform:"Airbnb", checkIn: isoShift(9),  checkOut: isoShift(12), phone4:"7310", summary:"Reserved", nights:3, early:true, earlyTime:"11am" },
    { uid:"s4", platform:"VRBO",   checkIn: isoShift(14), checkOut: isoShift(17), phone4:"", summary:"Reserved - Lee", nights:3, late:true, lateTime:"2pm" },
  ],
};

/* ── Date helpers (local) ── */
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function parseISO(s) { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); }
function toISO(dt) { return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }
function fmtLong(s) { const d = parseISO(s); return DOW[d.getDay()]+" "+MONTHS[d.getMonth()].slice(0,3)+" "+d.getDate(); }
function fmtFull(s) { const d = parseISO(s); return DOW[d.getDay()]+", "+MONTHS[d.getMonth()]+" "+d.getDate()+", "+d.getFullYear(); }
const todayISO = toISO(new Date());

function nightsOf(s) { if (!s.checkIn || !s.checkOut) return 0; return Math.round((parseISO(s.checkOut)-parseISO(s.checkIn))/86400000); }
function guestName(s) { if (!s || !s.summary) return "";
  var n = s.summary.replace(/reserved/i,"").replace(/^[\s:\-–—]+/,"").trim();
  if (!n || /not available|blocked|airbnb|vrbo|closed/i.test(n)) return ""; return n; }
function inTimeOf(s) { return (s.early && s.earlyTime) ? s.earlyTime : DEFAULT_IN; }
function outTimeOf(s) { return (s.late && s.lateTime) ? s.lateTime : DEFAULT_OUT; }

/* ── Toast hook ── */
function useToast() {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, kind="ok") => { setToast({ msg, kind }); setTimeout(() => setToast(null), 2600); }, []);
  const node = toast ? <div className={"toast toast-"+toast.kind}>{toast.msg}</div> : null;
  return [node, show];
}

/* ════════════════════════════ App ════════════════════════ */
function App() {
  const [backend, setBackend] = useState(() => localStorage.getItem("cal_backend") || BACKEND_URL);
  const [ownerCode, setOwnerCode] = useState(() => localStorage.getItem("cal_owner") || "");
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState("");
  const [tab, setTab] = useState("calendar");
  const [month, setMonth] = useState(() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); });
  const [selected, setSelected] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [toastNode, toast] = useToast();
  const ownerMode = !!ownerCode;

  const load = useCallback(async (opts={}) => {
    if (!backend) { setData(SAMPLE); setLoading(false); return; }
    if (!opts.silent) setLoading(true);
    setErr("");
    try {
      const url = backend + (backend.indexOf("?")>=0 ? "&" : "?") + "v=2" + (opts.refresh ? "&refresh=1" : "");
      const res = await fetch(url);
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || "Backend error");
      setData(json);
    } catch (e) { setErr(String(e.message || e)); setData(prev => prev || null); }
    finally { setLoading(false); }
  }, [backend]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    const onFocus = () => load({ silent: true });
    window.addEventListener("focus", onFocus);
    const id = setInterval(() => load({ silent: true }), 300000);
    return () => { window.removeEventListener("focus", onFocus); clearInterval(id); };
  }, [load]);

  const stays = (data && data.stays) || [];
  const blocks = (data && data.blocks) || [];
  const dateFlags = (data && data.dateFlags) || {};

  // Derived sets
  const { turnDates } = useMemo(() => {
    const ins = {}, outs = {}, t = {};
    stays.forEach(s => { if (s.checkIn) ins[s.checkIn]=true; if (s.checkOut) outs[s.checkOut]=true; });
    Object.keys(outs).forEach(d => { if (ins[d]) t[d]=true; });
    return { turnDates: t };
  }, [stays]);

  const upcomingRes = stays.filter(s => (s.checkOut||s.checkIn) >= todayISO);
  const nextCheckout = stays.map(s=>s.checkOut).filter(d=>d && d>=todayISO).sort()[0];
  const nextTurn = Object.keys(turnDates).filter(d=>d>=todayISO).sort()[0];

  const saveSettings = (b, o) => {
    setBackend(b); setOwnerCode(o);
    localStorage.setItem("cal_backend", b); localStorage.setItem("cal_owner", o);
    setShowSettings(false); toast("Settings saved");
  };

  // POST helper
  const post = async (body) => {
    if (!backend) return { ok: true, sample: true };
    const res = await fetch(backend, { method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify({ ...body, ownerCode }) });
    return res.json();
  };

  const saveStayFlag = async (stay, patch) => {
    const next = { early:!!stay.early, earlyTime:stay.earlyTime||"", late:!!stay.late, lateTime:stay.lateTime||"", note:stay.note||"", ...patch };
    setData(d => ({ ...d, stays: d.stays.map(s => s.uid===stay.uid ? { ...s, ...next } : s) }));
    try { const r = await post({ action:"setFlag", uid:stay.uid, ...next }); if (r && r.ok===false) throw new Error(r.error); toast("Saved"); }
    catch (e) { toast("Couldn't save: "+(e.message||e), "err"); }
  };
  const saveBlockNote = async (block, note) => {
    setData(d => ({ ...d, blocks: d.blocks.map(b => b.uid===block.uid ? { ...b, note } : b) }));
    try { const r = await post({ action:"setFlag", uid:block.uid, note }); if (r && r.ok===false) throw new Error(r.error); toast("Saved"); }
    catch (e) { toast("Couldn't save: "+(e.message||e), "err"); }
  };
  const saveDateClean = async (iso, clean, note) => {
    setData(d => { const df = { ...(d.dateFlags||{}) }; if (clean) df[iso] = { clean:true, note:note||"" }; else delete df[iso]; return { ...d, dateFlags: df }; });
    try { const r = await post({ action:"setDateFlag", date:iso, clean, note:note||"" }); if (r && r.ok===false) throw new Error(r.error); toast(clean ? "Extra cleaning added" : "Removed"); }
    catch (e) { toast("Couldn't save: "+(e.message||e), "err"); }
  };

  return (
    <div className="wrap">
      {toastNode}
      <div className="app-head">
        <h1>🏠 Rough River Cleaning Calendar</h1>
        <div className="sub">Check-ins, check-outs & turnarounds — synced from Airbnb & VRBO</div>
        <div className="head-actions">
          <button className="icon-btn" onClick={() => load({ refresh: true })} disabled={loading}>
            <span className={loading ? "spin" : ""}>↻</span> {loading ? "Syncing…" : "Refresh"}
          </button>
          <button className="icon-btn" onClick={() => setShowSettings(true)}>⚙ Settings</button>
        </div>
      </div>

      {data && data.sample && <div className="banner">👋 <b>Demo mode</b> — sample data. Add your Apps Script URL in ⚙ Settings to go live.</div>}
      {err && !data && <div className="banner">⚠ Couldn't reach the calendar service. {err}</div>}
      {data && data.errors && data.errors.length>0 && <div className="banner">⚠ Some feeds had trouble: {data.errors.join("; ")}</div>}

      <div className="tabs">
        <button className={tab==="calendar"?"active":""} onClick={()=>setTab("calendar")}>📅 Calendar</button>
        <button className={tab==="list"?"active":""} onClick={()=>setTab("list")}>📋 List</button>
      </div>

      <div className="chips">
        <span className="chip">🏠 <b>{upcomingRes.length}</b> upcoming reservation{upcomingRes.length===1?"":"s"}</span>
        <span className="chip">🧽 Next checkout/cleaning: <b>{nextCheckout ? fmtLong(nextCheckout) : "none"}</b></span>
        <span className="chip">♻️ Next same-day turnaround: <b>{nextTurn ? fmtLong(nextTurn) : "none"}</b></span>
      </div>

      {tab==="calendar"
        ? <CalendarView month={month} setMonth={setMonth} stays={stays} blocks={blocks}
            turnDates={turnDates} dateFlags={dateFlags} onPick={setSelected} />
        : <ListView stays={stays} turnDates={turnDates} onPick={setSelected} />}

      {selected && <DetailSheet selected={selected} stays={stays} blocks={blocks} dateFlags={dateFlags}
        turnDates={turnDates} ownerMode={ownerMode}
        onClose={()=>setSelected(null)} saveStayFlag={saveStayFlag} saveBlockNote={saveBlockNote} saveDateClean={saveDateClean} />}

      {showSettings && <SettingsSheet backend={backend} ownerCode={ownerCode} onClose={()=>setShowSettings(false)} onSave={saveSettings} />}
    </div>
  );
}

/* ── Build month weeks ── */
function buildWeeks(year, month) {
  const first = new Date(year, month, 1);
  const gridStart = new Date(year, month, 1 - first.getDay());
  const weeks = []; let cur = new Date(gridStart);
  for (let w=0; w<6; w++) {
    const days = [];
    for (let d=0; d<7; d++) { days.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
    weeks.push(days);
    if (days[6].getMonth() !== month && days[6] > first) break;
  }
  return weeks;
}

/* ── Compute bar segments + lanes for one week ── */
function weekLayout(weekDays, items) {
  const wStart = toISO(weekDays[0]), wEnd = toISO(weekDays[6]);
  const segs = [];
  items.forEach(it => {
    if (!(it.checkIn <= wEnd && it.checkOut >= wStart)) return;
    const inIdx = weekDays.findIndex(d => toISO(d)===it.checkIn);
    const outIdx = weekDays.findIndex(d => toISO(d)===it.checkOut);
    const isStart = inIdx >= 0, isEnd = outIdx >= 0;
    const startCol = isStart ? inIdx : 0, endCol = isEnd ? outIdx : 6;
    const startX = isStart ? startCol+0.5 : 0;
    const endX = isEnd ? endCol+0.5 : 7;
    if (endX <= startX) return;
    segs.push({ it, startX, endX, isStart, isEnd });
  });
  segs.sort((a,b)=>a.startX-b.startX);
  const laneEnds = [];
  segs.forEach(s => {
    let lane = laneEnds.findIndex(e => e <= s.startX + 0.001);
    if (lane === -1) { lane = laneEnds.length; laneEnds.push(s.endX); } else laneEnds[lane] = s.endX;
    s.lane = lane;
  });
  return { segs, lanes: laneEnds.length };
}

const NUM_ROW = 22, LANE_H = 24, BAR_H = 20, PADB = 4;

function CalendarView({ month, setMonth, stays, blocks, turnDates, dateFlags, onPick }) {
  const y = month.getFullYear(), m = month.getMonth();
  const weeks = buildWeeks(y, m);
  const items = [...blocks.map(b=>({ ...b, _kind:"block" })), ...stays.map(s=>({ ...s, _kind:"stay" }))];

  return (
    <div className="card pad">
      <div className="monthbar">
        <button className="navbtn" onClick={()=>setMonth(new Date(y, m-1, 1))} aria-label="Previous month">‹</button>
        <h2>{MONTHS[m]} {y}</h2>
        <div style={{display:"flex", gap:"8px", alignItems:"center"}}>
          <button className="today-btn" onClick={()=>{const d=new Date(); setMonth(new Date(d.getFullYear(), d.getMonth(), 1));}}>Today</button>
          <button className="navbtn" onClick={()=>setMonth(new Date(y, m+1, 1))} aria-label="Next month">›</button>
        </div>
      </div>
      <div className="dow">{DOW.map(d => <span key={d}>{d}</span>)}</div>

      {weeks.map((days, wi) => {
        const { segs, lanes } = weekLayout(days, items);
        const wkH = NUM_ROW + Math.max(lanes,1)*LANE_H + PADB;
        return (
          <div className="cal-week" key={wi} style={{ height: wkH+"px" }}>
            <div className="cal-grid">
              {days.map((d, di) => {
                const iso = toISO(d);
                const cls = ["cal-cell"];
                if (d.getMonth() !== m) cls.push("out-month");
                if (iso === todayISO) cls.push("today");
                const isTurn = turnDates[iso];
                const isClean = dateFlags[iso] && dateFlags[iso].clean;
                return (
                  <div key={di} className={cls.join(" ")} onClick={()=>onPick({ type:"day", iso })}>
                    <div className="dn">{d.getDate()}</div>
                    {(isTurn || isClean) &&
                      <div className="marks">
                        {isTurn && <span title="Same-day turnaround">♻️</span>}
                        {isClean && <span title={"Extra cleaning"+(dateFlags[iso].note?": "+dateFlags[iso].note:"")}>🧹</span>}
                      </div>}
                  </div>
                );
              })}
            </div>
            <div className="cal-bars">
              {segs.map((seg, si) => {
                const it = seg.it;
                const left = seg.startX/7*100, width = (seg.endX-seg.startX)/7*100;
                const style = { left:"calc("+left+"% + 1px)", width:"calc("+width+"% - 2px)", top:(seg.lane*LANE_H)+"px", height:BAR_H+"px" };
                if (it._kind === "block") {
                  return (
                    <button key={si} className="bar bar-block" style={style}
                      onClick={(e)=>{ e.stopPropagation(); onPick({ type:"block", uid:it.uid }); }}>
                      <span className="bnote">🔒 {it.note || "Blocked"}</span>
                    </button>
                  );
                }
                return (
                  <button key={si} className="bar bar-stay" style={style}
                    onClick={(e)=>{ e.stopPropagation(); onPick({ type:"stay", uid:it.uid }); }}>
                    {seg.isStart && <span className="cap capL">IN {inTimeOf(it)}</span>}
                    <span className="bmid">{guestName(it)}</span>
                    {seg.isEnd && <span className="cap capR">OUT {outTimeOf(it)}</span>}
                  </button>
                );
              })}
            </div>
          </div>
        );
      })}

      <div className="legend">
        <span><i className="sw" style={{background:"var(--primary)"}}></i> Reservation (IN one end, OUT the other)</span>
        <span><i className="sw" style={{background:"#64748b"}}></i> Blocked</span>
        <span>♻️ Same-day turnaround</span>
        <span>🧹 Extra cleaning</span>
      </div>
    </div>
  );
}

/* ── List view ── */
function ListView({ stays, turnDates, onPick }) {
  const upcoming = stays.filter(s => (s.checkOut||s.checkIn) >= todayISO);
  const past = stays.filter(s => (s.checkOut||s.checkIn) < todayISO).reverse();
  const render = (s) => {
    const isPast = (s.checkOut||s.checkIn) < todayISO;
    const turn = !!turnDates[s.checkOut];   // this stay's checkout day is a turnaround
    return (
      <button key={s.uid} className="stay" onClick={()=>onPick({ type:"stay", uid:s.uid })}>
        <div className="accent" style={{background: turn ? "var(--turn)" : (s.early||s.late ? "var(--early)" : "var(--in)")}}></div>
        <div className="body">
          <div className="row1">
            <span className="dates">{fmtLong(s.checkIn)} → {fmtLong(s.checkOut)}</span>
            {turn && <span className="tag turn">♻ SAME-DAY TURNAROUND</span>}
            {s.early && <span className="tag early">⚡ EARLY {s.earlyTime||""}</span>}
            {s.late && <span className="tag late">🌙 LATE {s.lateTime||""}</span>}
            {isPast && <span className="tag past">PAST</span>}
          </div>
          <div className="times">IN {inTimeOf(s)} · OUT {outTimeOf(s)}</div>
          <div className="meta">
            <span className="tag plat">{s.platform}</span>
            {guestName(s) && <span>👤 {guestName(s)}</span>}
            <span>🌙 {s.nights || nightsOf(s)} night{(s.nights||nightsOf(s))===1?"":"s"}</span>
            {s.phone4 && <span>📞 ····{s.phone4}</span>}
          </div>
        </div>
      </button>
    );
  };
  return (
    <div>
      <div className="group-h">UPCOMING</div>
      {upcoming.length ? upcoming.map(render) : <div className="empty">No upcoming bookings yet.</div>}
      {past.length>0 && <div className="group-h">RECENT (past)</div>}
      {past.map(render)}
    </div>
  );
}

/* ── Detail sheet (stay / block / day) ── */
function DetailSheet({ selected, stays, blocks, dateFlags, turnDates, ownerMode, onClose, saveStayFlag, saveBlockNote, saveDateClean }) {
  let content = null, title = "Booking";
  if (selected.type === "stay") {
    const s = stays.find(x => x.uid === selected.uid);
    title = guestName(s) || "Reservation";
    content = s ? <StayDetail s={s} turn={!!turnDates[s.checkOut]} ownerMode={ownerMode} save={saveStayFlag} /> : <p>Not found.</p>;
  } else if (selected.type === "block") {
    const b = blocks.find(x => x.uid === selected.uid);
    title = "Blocked dates";
    content = b ? <BlockDetail b={b} ownerMode={ownerMode} save={saveBlockNote} /> : <p>Not found.</p>;
  } else if (selected.type === "day") {
    title = fmtFull(selected.iso);
    content = <DayDetail iso={selected.iso} stays={stays} blocks={blocks} dateFlags={dateFlags} turn={!!turnDates[selected.iso]}
                ownerMode={ownerMode} saveDateClean={saveDateClean} onJump={(sel)=>{ /* replace */ }} />;
  }
  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <button className="closebtn" onClick={onClose}>✕</button>
        <h3>{title}</h3>
        <div style={{marginTop:"10px"}}>{content}</div>
      </div>
    </div>
  );
}

function StayDetail({ s, turn, ownerMode, save }) {
  const [earlyT, setEarlyT] = useState(s.earlyTime || "");
  const [lateT, setLateT] = useState(s.lateTime || "");
  return (
    <div>
      <div style={{display:"flex", gap:"8px", alignItems:"center", marginBottom:"8px", flexWrap:"wrap"}}>
        <span className="tag plat">{s.platform}</span>
        {turn && <span className="tag turn">♻ Same-day turnaround</span>}
        {s.early && <span className="tag early">⚡ Early</span>}
        {s.late && <span className="tag late">🌙 Late</span>}
      </div>
      {guestName(s) && <div className="kv"><span className="k">Guest</span><span className="v">{guestName(s)}</span></div>}
      <div className="kv"><span className="k">Check-in</span><span className="v">{fmtFull(s.checkIn)} · {inTimeOf(s)}</span></div>
      <div className="kv"><span className="k">Check-out</span><span className="v">{fmtFull(s.checkOut)} · {outTimeOf(s)}</span></div>
      <div className="kv"><span className="k">Nights</span><span className="v">{s.nights || nightsOf(s)}</span></div>
      {s.phone4 && <div className="kv"><span className="k">Guest phone</span><span className="v">····{s.phone4}</span></div>}
      {s.link && <div className="kv"><span className="k">Reservation</span><span className="v"><a href={s.link} target="_blank" rel="noreferrer">Open ↗</a></span></div>}

      {ownerMode &&
        <div className="owner-box">
          <div className="switch-row">
            <div><b style={{fontSize:"14px"}}>⚡ Early check-in</b><div style={{fontSize:"12px", color:"var(--muted)"}}>Overrides the {DEFAULT_IN} default</div></div>
            <label className="switch"><input type="checkbox" checked={!!s.early} onChange={e=>save(s, { early:e.target.checked, earlyTime:earlyT })} /><span className="slider"></span></label>
          </div>
          {s.early && <input className="field" placeholder="Check-in time (e.g. 11am)" value={earlyT} onChange={e=>setEarlyT(e.target.value)} onBlur={()=>save(s, { early:true, earlyTime:earlyT })} />}
          <div className="switch-row" style={{marginTop:"14px"}}>
            <div><b style={{fontSize:"14px"}}>🌙 Late checkout</b><div style={{fontSize:"12px", color:"var(--muted)"}}>Overrides the {DEFAULT_OUT} default</div></div>
            <label className="switch"><input type="checkbox" checked={!!s.late} onChange={e=>save(s, { late:e.target.checked, lateTime:lateT })} /><span className="slider"></span></label>
          </div>
          {s.late && <input className="field" placeholder="Check-out time (e.g. 2pm)" value={lateT} onChange={e=>setLateT(e.target.value)} onBlur={()=>save(s, { late:true, lateTime:lateT })} />}
        </div>}
    </div>
  );
}

function BlockDetail({ b, ownerMode, save }) {
  const [note, setNote] = useState(b.note || "");
  return (
    <div>
      <div style={{display:"flex", gap:"8px", marginBottom:"8px"}}><span className="tag block">🔒 Blocked · {b.platform}</span></div>
      <div className="kv"><span className="k">From</span><span className="v">{fmtFull(b.checkIn)}</span></div>
      <div className="kv"><span className="k">Until</span><span className="v">{fmtFull(b.checkOut)}</span></div>
      {b.note && <div className="kv"><span className="k">Reason</span><span className="v">{b.note}</span></div>}
      {ownerMode &&
        <div className="owner-box">
          <b style={{fontSize:"14px"}}>📝 Reason / note</b>
          <div style={{fontSize:"12px", color:"var(--muted)", marginBottom:"2px"}}>Shows in the gray bar (Airbnb/VRBO don't share your block notes).</div>
          <input className="field" placeholder="e.g. Family, Kids, Maintenance" value={note} onChange={e=>setNote(e.target.value)} />
          <button className="btn-primary" style={{marginTop:"10px", width:"100%"}} onClick={()=>save(b, note)}>Save note</button>
        </div>}
    </div>
  );
}

function DayDetail({ iso, stays, blocks, dateFlags, turn, ownerMode, saveDateClean }) {
  const flag = dateFlags[iso] || {};
  const [note, setNote] = useState(flag.note || "");
  const arrivals = stays.filter(s => s.checkIn === iso);
  const departures = stays.filter(s => s.checkOut === iso);
  const blocked = blocks.filter(b => b.checkIn <= iso && b.checkOut >= iso);
  return (
    <div>
      {turn && <div className="tag turn" style={{display:"inline-block", marginBottom:"8px"}}>♻ SAME-DAY TURNAROUND</div>}
      {departures.length>0 && <div className="kv"><span className="k">Check-OUT</span><span className="v">{departures.map(s=>(guestName(s)||s.platform)+" · "+outTimeOf(s)).join(", ")}</span></div>}
      {arrivals.length>0 && <div className="kv"><span className="k">Check-IN</span><span className="v">{arrivals.map(s=>(guestName(s)||s.platform)+" · "+inTimeOf(s)).join(", ")}</span></div>}
      {blocked.length>0 && <div className="kv"><span className="k">Blocked</span><span className="v">{blocked.map(b=>b.note||"Blocked").join(", ")}</span></div>}
      {departures.length===0 && arrivals.length===0 && blocked.length===0 &&
        <p style={{color:"var(--muted)", padding:"6px 0"}}>Nothing scheduled this day.</p>}

      {ownerMode &&
        <div className="owner-box">
          <div className="switch-row">
            <div><b style={{fontSize:"14px"}}>🧹 Extra cleaning</b><div style={{fontSize:"12px", color:"var(--muted)"}}>Flag a clean on this date</div></div>
            <label className="switch"><input type="checkbox" checked={!!flag.clean} onChange={e=>saveDateClean(iso, e.target.checked, note)} /><span className="slider"></span></label>
          </div>
          {flag.clean && <input className="field" placeholder="Note (optional, e.g. mid-stay clean)" value={note} onChange={e=>setNote(e.target.value)} onBlur={()=>saveDateClean(iso, true, note)} />}
        </div>}
    </div>
  );
}

/* ── Settings sheet ── */
function SettingsSheet({ backend, ownerCode, onClose, onSave }) {
  const [b, setB] = useState(backend);
  const [o, setO] = useState(ownerCode);
  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <button className="closebtn" onClick={onClose}>✕</button>
        <h3>⚙ Settings</h3>
        <p style={{color:"var(--muted)", fontSize:"13px", margin:"6px 0 14px"}}>The cleaner can leave the owner code blank — that's view-only.</p>
        <label style={{fontSize:"13px", fontWeight:600}}>Apps Script Web App URL</label>
        <input className="field" placeholder="https://script.google.com/macros/s/…/exec" value={b} onChange={e=>setB(e.target.value.trim())} />
        <label style={{fontSize:"13px", fontWeight:600, display:"block", marginTop:"14px"}}>Owner code <span style={{fontWeight:400, color:"var(--muted)"}}>(unlocks early/late & cleaning toggles)</span></label>
        <input className="field" type="password" placeholder="leave blank for view-only" value={o} onChange={e=>setO(e.target.value)} />
        <div style={{display:"flex", gap:"10px", marginTop:"18px"}}>
          <button className="btn-primary" style={{flex:1}} onClick={()=>onSave(b.trim(), o)}>Save</button>
          <button className="btn-ghost" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
